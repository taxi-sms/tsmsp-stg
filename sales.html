<script>
(function(){
  const REPORT_KEY='tsms_reports';
  const REPORT_ARCHIVE_KEY='tsms_reports_archive';
  const OPS_KEY='ops';
  const OPS_ARCHIVE_KEY='ops_archive_v1'; // ★追加：opsクリア後はここを見る

  const SETTINGS_KEY='tsms_settings';
  const PLAN_KEY='tsms_sales_plan';
  const MANUAL_KEY='tsms_sales_manual_v1';
  const MANUAL_MODE_KEY='tsms_sales_manual_mode';
  const HOLIDAY_KEY='tsms_holidays_jp_v1';
  const SALES_RESET_TOKEN_KEY='tsms_sales_reset_token';
  const SALES_RESET_TOKEN='20260216-reset-1';
  const SHIFT_ORDER=['work','holiday','absence','part','furidashi','furikyu'];
  const SHIFT_LABEL={work:'出勤',holiday:'休日',absence:'欠勤',part:'バイト',furidashi:'振出',furikyu:'振休'};
  const SHIFT_CLASS={work:'s-work',holiday:'s-holiday',absence:'s-absence',part:'s-part',furidashi:'s-furidashi',furikyu:'s-furikyu'};

  const defaults={taxRate:10,feeRate:4,goFeeYen:100,walkRate:50,closeStartDay:16,closeEndDay:15};

  const monthSelect=document.getElementById('monthSelect');
  const tbody=document.getElementById('tbody');
  const manualEditBtn=document.getElementById('manualEditBtn');
  let manualEditMode = localStorage.getItem(MANUAL_MODE_KEY)==='1';

  function loadJson(k,f){try{const v=JSON.parse(localStorage.getItem(k)||'null');return v==null?f:v;}catch(_){return f;}}
  function saveJson(k,v){localStorage.setItem(k,JSON.stringify(v));}
  function applySalesOneTimeReset(){
    try{
      const done = localStorage.getItem(SALES_RESET_TOKEN_KEY);
      if(done === SALES_RESET_TOKEN) return;
      // Keep existing plan data. Only record migration marker.
      localStorage.setItem(SALES_RESET_TOKEN_KEY, SALES_RESET_TOKEN);
    }catch(_){ }
  }
  function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  function parseYmd(s){const [y,m,d]=String(s).split('-').map(Number);return new Date(y,m-1,d);}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function addMonths(d,n){const x=new Date(d);x.setMonth(x.getMonth()+n);return x;}
  function fmtNum(v){return Math.round(Number(v)||0).toLocaleString('ja-JP');}
  function pad2(n){return String(n).padStart(2,'0');}
  function hm(totalMin){const m=Math.max(0,Math.round(Number(totalMin)||0));return `${Math.floor(m/60)}:${pad2(m%60)}`;}
  function parseHmToMin(v){
    if(!v) return NaN;
    const m=String(v).trim().match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return NaN;
    const h=Number(m[1]), mm=Number(m[2]);
    if(!Number.isFinite(h) || !Number.isFinite(mm) || mm<0 || mm>59) return NaN;
    return h*60 + mm;
  }
  function calcSpanMin(fromHm, toHm){
    const fromMin = parseHmToMin(fromHm);
    const toMin = parseHmToMin(toHm);
    if(!Number.isFinite(fromMin) || !Number.isFinite(toMin)) return NaN;
    let diff = toMin - fromMin;
    if(diff < 0) diff += 24 * 60;
    return diff;
  }
  function dowJa(d){return ['日','月','火','水','木','金','土'][d.getDay()];}
  function minDiff(a,b){
    const x=new Date(a).getTime(), y=new Date(b).getTime();
    if(isNaN(x)||isNaN(y)) return 0;
    return Math.max(0,Math.round((y-x)/60000));
  }
  function todayYmd(){ const n=new Date(); return ymd(new Date(n.getFullYear(),n.getMonth(),n.getDate())); }

  async function loadHolidaySet(){
    try{
      const cached = loadJson(HOLIDAY_KEY, null);
      if(cached && typeof cached === 'object' && cached.map){
        const age = Date.now() - Number(cached.fetchedAt||0);
        if(age < 1000*60*60*24*7){
          return new Set(Object.keys(cached.map));
        }
      }
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), 5000);
      const res = await fetch('https://holidays-jp.github.io/api/v1/date.json', {signal: ctrl.signal});
      clearTimeout(t);
      if(!res.ok) throw new Error('holiday fetch failed');
      const json = await res.json();
      saveJson(HOLIDAY_KEY, {fetchedAt:Date.now(), map:json});
      return new Set(Object.keys(json||{}));
    }catch(_){
      const fallback = loadJson(HOLIDAY_KEY, {map:{}});
      return new Set(Object.keys((fallback&&fallback.map)||{}));
    }
  }

  function toDayId(r){
    if(r&&r.dayId) return String(r.dayId);
    const d=new Date(r?.ts||r?.createdAt||r?.at||Date.now());
    return isNaN(d)?'':ymd(d);
  }

  function getSettings(){ return Object.assign({}, defaults, loadJson(SETTINGS_KEY, {})); }

  function getAllReports(){
    const active = loadJson(REPORT_KEY, []);
    const archived = loadJson(REPORT_ARCHIVE_KEY, []);
    return ([]).concat(Array.isArray(active)?active:[], Array.isArray(archived)?archived:[]);
  }

  function getPeriodForDate(date,startDay,endDay){
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    let start = new Date(d.getFullYear(), d.getMonth(), startDay);
    if(d.getDate() < startDay) start = addMonths(start,-1);
    let end = new Date(start.getFullYear(), start.getMonth(), endDay);
    if(end < start) end = addMonths(end,1);
    return {start,end};
  }

  function periodId(p){ return `${ymd(p.start)}_${ymd(p.end)}`; }
  function periodLabel(p){ return `${ymd(p.start)} 〜 ${ymd(p.end)}`; }

  function periodDays(p){
    const out=[]; let d=new Date(p.start);
    while(d<=p.end){ out.push(new Date(d)); d=addDays(d,1); }
    return out;
  }

  function calcDayNet(dayId, reports, settings){
    const rows=reports.filter(r=>toDayId(r)===dayId);
    if(!rows.length) return 0;
    let gross=0, feeBase=0, goFeeCases=0;
    rows.forEach(r=>{
      const cash=Number(r.cash)||0, credit=Number(r.credit)||0;
      gross += cash + credit;
      const pay=String(r.payMethod||'');
      if(['QR','クレカ','電子M'].includes(pay)) feeBase += cash + credit;
      const ride=String(r.rideType||'');
      if(ride==='GO' && !['GO pay','GO Pay','乗込GO Pay'].includes(pay)) goFeeCases += 1;
    });
    const fee = feeBase * (Number(settings.feeRate)||0) / 100;
    const goFee = goFeeCases * (Number(settings.goFeeYen)||0);
    const salesInTax = gross - fee - goFee;
    const taxRate = (Number(settings.taxRate)||0) / 100;
    const salesExTax = salesInTax / (1 + taxRate);
    return Math.round(salesExTax * (Number(settings.walkRate)||0) / 100);
  }

  // ★追加：dayIdに対応するopsデータを「アーカイブ優先 → なければ当日のops」
  function getOpsForDay(dayId){
    try{
      const arch = loadJson(OPS_ARCHIVE_KEY, {});
      if(arch && typeof arch === 'object' && arch[dayId] && arch[dayId].returnAt){
        return arch[dayId];
      }
    }catch(_){}

    const ops = loadJson(OPS_KEY, null);
    if(!ops) return null;
    const opsDay = (ops && ops.dayId) ? String(ops.dayId) : String(localStorage.getItem('tsms_report_current_day')||'');
    if(opsDay!==dayId || !ops.returnAt) return null;
    return ops;
  }

  function calcOpsDay(dayId){
    const ops = getOpsForDay(dayId);
    if(!ops || !ops.returnAt) return null;
    const depart=ops.departAt?new Date(ops.departAt):null;
    const ret=ops.returnAt?new Date(ops.returnAt):null;
    const breakMin=(ops.breakSessions||[]).reduce((s,x)=>s+(Number(x.minutes)||0),0);
    const workMin=(depart&&ret)?Math.max(0,minDiff(depart,ret)-breakMin):0;
    return {
      depart: depart?`${pad2(depart.getHours())}:${pad2(depart.getMinutes())}`:'--',
      return: ret?`${pad2(ret.getHours())}:${pad2(ret.getMinutes())}`:'--',
      boundMin: (depart&&ret)?Math.max(0,minDiff(depart,ret)):0,
      breakMin,
      workMin
    };
  }

  function getPlan(){ return loadJson(PLAN_KEY, {}); }
  function savePlan(p){ saveJson(PLAN_KEY, p); }
  function getManual(){ return loadJson(MANUAL_KEY, {}); }
  function saveManual(m){ saveJson(MANUAL_KEY, m); }
  function setManualButtonState(){
    if(!manualEditBtn) return;
    manualEditBtn.classList.toggle('active', manualEditMode);
    manualEditBtn.setAttribute('aria-pressed', manualEditMode?'true':'false');
  }

  function buildPeriods(settings,reports,plan){
    const set = new Map();
    const seed=[new Date()];

    reports.forEach(r=>{ const d=parseYmd(toDayId(r)); if(!isNaN(d)) seed.push(d); });

    // ★追加：ops（当日）も seed に入れる
    const ops=loadJson(OPS_KEY,{});
    if(ops && ops.dayId){ const d=parseYmd(ops.dayId); if(!isNaN(d)) seed.push(d); }

    // ★追加：opsアーカイブの日付も seed に入れる（売上が無い日でも勤務実績があるケース対策）
    const opsArch = loadJson(OPS_ARCHIVE_KEY, {});
    if(opsArch && typeof opsArch === 'object'){
      Object.keys(opsArch).forEach((k)=>{
        const d=parseYmd(k);
        if(!isNaN(d)) seed.push(d);
      });
    }

    // plan（日別目標）の日付も seed に入れる
    if(plan && typeof plan === 'object'){
      Object.keys(plan).forEach((k)=>{
        const d=parseYmd(k);
        if(!isNaN(d)) seed.push(d);
      });
    }

    // data-derived periods
    seed.forEach(d=>{ const p=getPeriodForDate(d, Number(settings.closeStartDay)||16, Number(settings.closeEndDay)||15); set.set(periodId(p), p); });

    // always include current + next 2 closing periods for planning
    const today = new Date();
    const base = getPeriodForDate(today, Number(settings.closeStartDay)||16, Number(settings.closeEndDay)||15);
    set.set(periodId(base), base);
    [1,2].forEach((m)=>{
      const shifted = addMonths(base.start, m);
      const future = getPeriodForDate(shifted, Number(settings.closeStartDay)||16, Number(settings.closeEndDay)||15);
      set.set(periodId(future), future);
    });

    const list = Array.from(set.values());
    const baseStartMs = base.start.getTime();
    list.sort((a,b)=>{
      const am = a.start.getTime();
      const bm = b.start.getTime();
      const aFuture = am >= baseStartMs;
      const bFuture = bm >= baseStartMs;
      if(aFuture && bFuture) return am - bm; // current -> next -> next2 ...
      if(aFuture !== bFuture) return aFuture ? -1 : 1; // future block first
      return bm - am; // past block: latest first
    });
    return list;
  }

  function render(holidaySet){
    const settings=getSettings();
    const reports=getAllReports();
    const plan=getPlan();
    const periods=buildPeriods(settings,reports,plan);

    if(!monthSelect.options.length){
      monthSelect.innerHTML=periods.map(p=>`<option value="${periodId(p)}">${periodLabel(p)}</option>`).join('');
    }
    if(!monthSelect.value && periods[0]) monthSelect.value=periodId(periods[0]);

    const period = periods.find(p=>periodId(p)===monthSelect.value) || periods[0];
    if(!period) return;
    const days=periodDays(period);
    const todayId = todayYmd();
    const manual = getManual();
    const reportedDaySet = new Set(reports.map((r)=>toDayId(r)).filter(Boolean));

    tbody.innerHTML='';
    let sumTarget=0,sumResult=0,sumDiff=0,sumBound=0,sumWork=0,sumBreak=0;

    days.forEach((d,idx)=>{
      const dayId=ymd(d);
      if(!plan[dayId]) plan[dayId]={ shift:'work', target:'' };
      const row=plan[dayId];
      // Backfill legacy plan rows that were saved without shift/target fields.
      if(!row.shift) row.shift='work';
      if(row.target==null) row.target='';
      const shift=row.shift;
      const active=(shift==='work' || shift==='part' || shift==='furidashi');
      const pastLocked = dayId < todayId;

      const result=active?calcDayNet(dayId,reports,settings):0;
      const hasTargetInput = row.target!=null && String(row.target).trim()!=='';
      const target=active?(Number(row.target)||0):0;
      const opsData=active?calcOpsDay(dayId):null;
      const workMin=opsData?opsData.workMin:0;
      const breakMin=opsData?opsData.breakMin:0;
      const manualRow=manual[dayId]||{};
      const manualResult=Number(String(manualRow.result||'').replace(/[^0-9]/g,''));
      const manualBoundMin=parseHmToMin(manualRow.bound);
      const manualWorkMin=parseHmToMin(manualRow.work);
      const manualBreakMin=parseHmToMin(manualRow.break);
      const hasManualResult = manualRow.result!=null && String(manualRow.result).trim()!=='';
      const hasReportedResult = reportedDaySet.has(dayId);
      const hasResultInput = hasManualResult || hasReportedResult;
      const hasManualDepart = manualRow.depart!=null && String(manualRow.depart).trim()!=='';
      const hasManualReturn = manualRow.return!=null && String(manualRow.return).trim()!=='';
      const hasManualBound = manualRow.bound!=null && String(manualRow.bound).trim()!=='';
      const hasManualWork = manualRow.work!=null && String(manualRow.work).trim()!=='';
      const hasManualBreak = manualRow.break!=null && String(manualRow.break).trim()!=='';
      const showResult=(hasManualResult && Number.isFinite(manualResult))?manualResult:result;
      const showWorkMin=(hasManualWork && Number.isFinite(manualWorkMin))?manualWorkMin:workMin;
      const showBreakMin=(hasManualBreak && Number.isFinite(manualBreakMin))?manualBreakMin:breakMin;
      const showDepart=hasManualDepart?manualRow.depart:(opsData?opsData.depart:'--');
      const showReturn=hasManualReturn?manualRow.return:(opsData?opsData.return:'--');
      const derivedBoundMin=calcSpanMin(showDepart, showReturn);
      const showBoundMin=(hasManualBound && Number.isFinite(manualBoundMin))
        ? manualBoundMin
        : (Number.isFinite(derivedBoundMin) ? derivedBoundMin : (opsData?opsData.boundMin:0));
      const hasBoundValue = hasManualBound || Number.isFinite(derivedBoundMin) || !!opsData;
      const shouldCalcDiff = active && hasTargetInput && hasResultInput;
      const diff=shouldCalcDiff?(showResult-target):null;
      const hour=showWorkMin>0?Math.round(showResult/(showWorkMin/60)):0;
      const showHourText=(hasManualResult || hasManualWork || opsData)?fmtNum(hour):'--';

      if(active){
        sumTarget+=target;
        sumResult+=showResult;
        if(shouldCalcDiff) sumDiff+=diff;
        sumBound+=showBoundMin;
        sumWork+=showWorkMin;
        sumBreak+=showBreakMin;
      }

      const tr=document.createElement('tr');
      const wk=d.getDay();
      const isHoliday = holidaySet && holidaySet.has(dayId);
      const wkCls=wk===6?'sat':((wk===0||isHoliday)?'sun holiday':'');
      tr.innerHTML=`
        <td>
          <button type="button" class="shift-btn ${SHIFT_CLASS[shift]}" data-day="${dayId}" ${(pastLocked && !manualEditMode)?'disabled':''}>${SHIFT_LABEL[shift]}</button>
        </td>
        <td class="date ${wkCls}">${d.getMonth()+1}/${d.getDate()}(${dowJa(d)})</td>
        <td class="${(active||manualEditMode)?'':'muted'}"><input class="target-input" data-target="${dayId}" value="${String(row.target||'').replace(/[^0-9]/g,'')}" ${((manualEditMode || active) && (manualEditMode || !pastLocked))?'':'disabled'} inputmode="numeric"></td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input" data-manual="result" data-day="${dayId}" value="${(manualRow.result!=null && String(manualRow.result).trim()!=='')?String(manualRow.result).replace(/[^0-9]/g,''):String(result)}" inputmode="numeric">`:(active?fmtNum(showResult):'-')}</td>
        <td class="${active?'':'muted'}">${active?(shouldCalcDiff?(diff>=0?`+${fmtNum(diff)}`:`-${fmtNum(Math.abs(diff))}`):'-'):'-'}</td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input time" data-manual="depart" data-day="${dayId}" value="${(manualRow.depart!=null && String(manualRow.depart).trim()!=='')?manualRow.depart:(showDepart==='--'?'':showDepart)}" placeholder="--:--">`:(active?showDepart:'-')}</td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input time" data-manual="return" data-day="${dayId}" value="${(manualRow.return!=null && String(manualRow.return).trim()!=='')?manualRow.return:(showReturn==='--'?'':showReturn)}" placeholder="--:--">`:(active?showReturn:'-')}</td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input time" data-manual="bound" data-day="${dayId}" value="${(manualRow.bound!=null && String(manualRow.bound).trim()!=='')?manualRow.bound:(hasBoundValue?hm(showBoundMin):'')}" placeholder="0:00">`:(active?(hasBoundValue?hm(showBoundMin):'--'):'-')}</td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input time" data-manual="work" data-day="${dayId}" value="${(manualRow.work!=null && String(manualRow.work).trim()!=='')?manualRow.work:(opsData?hm(workMin):'')}" placeholder="0:00">`:(active?(hasManualWork?hm(showWorkMin):(opsData?hm(showWorkMin):'--')):'-')}</td>
        <td class="${(active||manualEditMode)?'':'muted'}">${manualEditMode?`<input class="manual-input time" data-manual="break" data-day="${dayId}" value="${(manualRow.break!=null && String(manualRow.break).trim()!=='')?manualRow.break:(opsData?hm(breakMin):'')}" placeholder="0:00">`:(active?(hasManualBreak?hm(showBreakMin):(opsData?hm(showBreakMin):'--')):'-')}</td>
        <td class="${active?'':'muted'}">${active?showHourText:'-'}</td>
      `;
      tbody.appendChild(tr);
    });

    savePlan(plan);

    document.getElementById('sumTarget').textContent=fmtNum(sumTarget);
    document.getElementById('sumResult').textContent=fmtNum(sumResult);
    document.getElementById('sumDiff').textContent=(sumDiff>=0?`+${fmtNum(sumDiff)}`:`-${fmtNum(Math.abs(sumDiff))}`);
    document.getElementById('sumBound').textContent=hm(sumBound);
    document.getElementById('sumWork').textContent=hm(sumWork);
    document.getElementById('sumBreak').textContent=hm(sumBreak);
    document.getElementById('sumHour').textContent=sumWork>0?fmtNum(Math.round(sumResult/(sumWork/60))):'0';
  }

  let holidaySet = new Set();
  monthSelect.addEventListener('change', ()=>render(holidaySet));
  if(manualEditBtn){
    manualEditBtn.addEventListener('click', ()=>{
      manualEditMode=!manualEditMode;
      localStorage.setItem(MANUAL_MODE_KEY, manualEditMode?'1':'0');
      setManualButtonState();
      render(holidaySet);
    });
  }

  tbody.addEventListener('click',(e)=>{
    const btn=e.target.closest('.shift-btn');
    if(!btn) return;
    const day=btn.dataset.day;
    const plan=getPlan();
    if(!plan[day]) plan[day]={shift:'work',target:''};
    const i=SHIFT_ORDER.indexOf(plan[day].shift);
    plan[day].shift = SHIFT_ORDER[(i+1)%SHIFT_ORDER.length];
    savePlan(plan);
    render(holidaySet);
  });

  tbody.addEventListener('input',(e)=>{
    const input=e.target.closest('input[data-target]');
    if(!input) return;
    const day=input.dataset.target;
    const plan=getPlan();
    if(!plan[day]) plan[day]={shift:'work',target:''};
    plan[day].target = String(input.value||'').replace(/[^0-9]/g,'');
    savePlan(plan);
  });

  tbody.addEventListener('input',(e)=>{
    const input=e.target.closest('input[data-manual]');
    if(!input) return;
    const day=input.dataset.day;
    const kind=input.dataset.manual;
    if(!day || !kind) return;
    const manual=getManual();
    if(!manual[day]) manual[day]={};
    if(kind==='result'){
      manual[day][kind]=String(input.value||'').replace(/[^0-9]/g,'');
      input.value=manual[day][kind];
    }else{
      manual[day][kind]=String(input.value||'').replace(/[^0-9:]/g,'').slice(0,5);
      input.value=manual[day][kind];
    }
    saveManual(manual);
  });

  tbody.addEventListener('change',(e)=>{
    const input=e.target.closest('input[data-target],input[data-manual]');
    if(!input) return;
    render(holidaySet);
  });

  (async function init(){
    applySalesOneTimeReset();
    setManualButtonState();
    holidaySet = await loadHolidaySet();
    render(holidaySet);
  })();
})();
</script>
