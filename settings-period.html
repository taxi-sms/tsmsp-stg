<header class="tsms-header">
  <div class="tsms-hamburger" id="tsmsHamburger" role="button" tabindex="0" aria-label="メニュー"><span></span><span></span><span></span></div>
  締め期間・シフト
  <a class="header-to-report" href="settings-home.html">設定トップへ</a>
</header>

<main class="main">
  <section class="section">
    <div class="title">締め期間・シフト</div>
    <div class="note">月間管理の期間表示と、メモとして使うシフト情報をここで設定します。</div>

    <div class="field"><div class="label">締め開始日（1〜31）</div><input class="input" id="closeStartDay" inputmode="numeric"></div>
    <div class="field"><div class="label">締め終了日（1〜31）</div><input class="input" id="closeEndDay" inputmode="numeric"></div>
    <div class="field"><div class="label">シフトメモ</div><input class="input" id="shiftNote"></div>

    <div class="actions">
      <button class="btn" id="btnSavePeriodHome" type="button">保存して設定トップへ</button>
      <button class="btn" id="btnSavePeriodSales" type="button">保存して月間管理へ</button>
      <button class="btn" id="btnResetPeriod" type="button" style="grid-column:1 / -1;">初期値に戻す</button>
    </div>
  </section>
</main>

<script>
(function(){
  const core = window.tsmsSettingsCore;
  if(!core) return;
  const showAlert = (message) => window.tsmsAlert ? window.tsmsAlert(message) : (alert(String(message || "")), Promise.resolve());
  const els = {
    closeStartDay: document.getElementById("closeStartDay"),
    closeEndDay: document.getElementById("closeEndDay"),
    shiftNote: document.getElementById("shiftNote")
  };

  core.fillPeriodFields(els, core.loadSettings());
  core.applyTheme(localStorage.getItem("tsms_theme") || "light");

  document.getElementById("btnSavePeriodHome").addEventListener("click", async () => {
    try{
      core.persistPeriodSettings(els);
      location.href = "settings-home.html";
    }catch(_){
      await showAlert("保存に失敗しました。入力内容をご確認ください。");
    }
  });

  document.getElementById("btnSavePeriodSales").addEventListener("click", async () => {
    try{
      core.persistPeriodSettings(els);
      location.href = "sales.html";
    }catch(_){
      await showAlert("保存に失敗しました。入力内容をご確認ください。");
    }
  });

  document.getElementById("btnResetPeriod").addEventListener("click", async () => {
    if(!(await window.tsmsConfirm("初期値に戻しますか？"))) return;
    core.resetPeriodSettings(els);
  });
})();
</script>
<script>(function(){if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){window.addEventListener('load', function(){navigator.serviceWorker.register('./sw.js?v=20260228-1').catch(function(){});});}})();</script>
