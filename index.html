<style>
:root{
  --bg:#F3F6F8;
  --surface-1:#FFFFFF;
  --surface-2:#EEF3F6;
  --border:#D5DEE6;
  --text-primary:#0F1720;
  --text-secondary:#344554;
  --text-muted:#5B6D7C;
  --accent:#2580ED;
  --work:#1c9b2d;
  --holiday:#f0ad00;
  --danger:#d64545;
}
:root[data-theme="dark"]{
  --bg:#0F1417;
  --surface-1:#0e1a2d;
  --surface-2:#0a1630;
  --border:#2f4d77;
  --text-primary:#ecf3ff;
  --text-secondary:#b6c8e6;
  --text-muted:#89a3c7;
  --accent:#4da3ff;
  --work:#1c9b2d;
  --holiday:#f0ad00;
  --danger:#d64545;
}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text-primary);
  font-family:"Noto Sans JP",sans-serif;
}
body{padding-bottom:78px;}
.header{
  position:sticky;
  top:0;
  z-index:20;
  min-height:60px;
  border-bottom:2px solid var(--border);
  background:var(--surface-1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:0 14px;
  font-weight:900;
}
:root[data-theme="dark"] .header{
  background:linear-gradient(180deg, rgba(22,42,76,.95), rgba(10,22,47,.95));
  box-shadow:0 10px 24px rgba(0,0,0,.3);
}
.header-title{
  font-size:36px;
  line-height:1;
  letter-spacing:.02em;
}
.header-meta{
  display:flex;
  gap:6px;
  align-items:center;
  font-size:13px;
  color:var(--text-secondary);
  font-weight:700;
  text-align:right;
}
.main{
  max-width:760px;
  margin:0 auto;
  padding:12px;
  display:grid;
  gap:8px;
}
.card{
  border:2px solid var(--border);
  background:var(--surface-1);
  border-radius:14px;
  padding:10px;
}
.dispatch-card{padding-bottom:8px;}
:root[data-theme="dark"] .card{
  background:linear-gradient(180deg, rgba(19,38,70,.95), rgba(8,20,42,.95));
  box-shadow:0 10px 26px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
}
.group-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 8px;
  font-size:26px;
  font-weight:900;
}
.group-title::after{
  content:"";
  flex:1 1 auto;
  border-top:2px solid var(--border);
  opacity:.95;
}
.group-note{
  margin:0 0 8px;
  font-size:13px;
  color:var(--text-muted);
  font-weight:700;
}
.swipe-track{
  --swipe-progress:0;
  --swipe-progress-pct:0%;
  --swipe-progress-tail:14%;
  --swipe-glow-x:28px;
  --swipe-glow-opacity:.18;
  --swipe-glow-scale:.985;
  --swipe-inset-blur:10px;
  --swipe-outer-blur:8px;
  --swipe-handle-glow:6px;
  --swipe-fill:rgba(255, 214, 102, .26);
  --swipe-glow-core:rgba(255, 247, 201, .96);
  --swipe-glow-mid:rgba(255, 214, 92, .58);
  --swipe-glow-edge:rgba(255, 255, 255, 0);
  position:relative;
  min-height:60px;
  border:2px solid var(--border);
  background:var(--surface-2);
  border-radius:999px;
  padding:4px;
  overflow:hidden;
  touch-action:pan-y;
  isolation:isolate;
}
.swipe-track::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  z-index:0;
  background:
    linear-gradient(90deg,
      var(--swipe-fill) 0%,
      rgba(255, 238, 180, .58) var(--swipe-progress-pct),
      rgba(255, 255, 255, 0) var(--swipe-progress-tail)),
    radial-gradient(circle at var(--swipe-glow-x) 50%,
      var(--swipe-glow-core) 0%,
      var(--swipe-glow-mid) 20%,
      rgba(255, 224, 117, .32) 38%,
      var(--swipe-glow-edge) 68%);
  opacity:var(--swipe-glow-opacity);
  transform:scale(var(--swipe-glow-scale));
  transition:opacity .12s ease, transform .12s ease;
  box-shadow:
    inset 0 0 var(--swipe-inset-blur) rgba(255, 236, 167, .24),
    0 0 var(--swipe-outer-blur) rgba(255, 216, 102, .28);
}
:root[data-theme="dark"] .swipe-track{
  --swipe-fill:rgba(111, 198, 255, .26);
  --swipe-glow-core:rgba(231, 247, 255, .98);
  --swipe-glow-mid:rgba(100, 191, 255, .7);
  --swipe-glow-edge:rgba(255, 255, 255, 0);
  background:linear-gradient(90deg, rgba(20,40,74,.92), rgba(62,118,194,.55));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.swipe-track.locked{ border-color:var(--accent); }
.swipe-track.locked .swipe-label{
  left:12px;
  right:12px;
  text-align:center;
}
.swipe-label{
  position:absolute;
  left:72px;
  right:12px;
  top:50%;
  z-index:1;
  transform:translateY(-50%);
  font-size:26px;
  font-weight:900;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
:root[data-theme="dark"] .swipe-label{ color:#e3efff; }
.swipe-handle{
  position:absolute;
  left:4px;
  top:50%;
  z-index:2;
  width:48px;
  height:48px;
  border:2px solid var(--accent);
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font:inherit;
  font-size:26px;
  font-weight:900;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  cursor:pointer;
  touch-action:none;
  transform:translate3d(0,-50%,0);
  box-shadow:
    0 0 var(--swipe-handle-glow) rgba(255, 215, 110, .28),
    0 6px 14px rgba(0,0,0,.12);
}
:root[data-theme="dark"] .swipe-handle{
  background:linear-gradient(180deg, #78c5ff, #3f9bff);
  border-color:#8ad0ff;
  box-shadow:0 4px 14px rgba(45,140,255,.45);
}
.swipe-track.dragging .swipe-handle{ transition:none !important; }
.swipe-handle .swipe-icon{
  width:24px;
  height:24px;
  display:block;
}
.swipe-handle .swipe-icon svg{
  width:24px;
  height:24px;
  stroke:#ffffff;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  display:block;
}
.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.calendar-month{
  margin:0;
  font-size:18px;
  font-weight:900;
  color:var(--text-secondary);
}
.calendar-nav{
  display:flex;
  align-items:center;
  gap:6px;
}
.calendar-nav-btn{
  appearance:none;
  width:32px;
  height:32px;
  border:2px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  color:var(--text-primary);
  font:inherit;
  font-size:20px;
  line-height:1;
  font-weight:900;
  display:grid;
  place-items:center;
  cursor:pointer;
}
:root[data-theme="dark"] .calendar-nav-btn{
  background:linear-gradient(180deg, rgba(16,33,62,.9), rgba(9,20,39,.9));
}
.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:5px;
}
.calendar-week span{
  text-align:center;
  font-size:13px;
  color:var(--text-muted);
  font-weight:800;
}
.calendar-day{
  border:2px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  min-height:44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  font:inherit;
  font-size:13px;
  font-weight:800;
  color:var(--text-primary);
  padding:2px;
}
:root[data-theme="dark"] .calendar-day{
  background:linear-gradient(180deg, rgba(15,31,58,.9), rgba(9,20,40,.9));
}
.calendar-day.empty{
  border-style:dashed;
  opacity:.35;
}
.calendar-day.today{
  border-color:var(--accent);
}
:root[data-theme="dark"] .calendar-day.today{
  box-shadow:0 0 0 2px rgba(88,194,255,.18), 0 0 14px rgba(65,148,255,.35);
}
.shift-dot{width:8px;height:8px;border-radius:50%;display:block;}
.shift-dot.work{background:var(--work);}
.shift-dot.holiday{background:var(--holiday);}
.shift-dot.absence{background:var(--danger);}
.calendar-info{
  margin:8px 0 0;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  padding:8px;
  font-size:13px;
  color:var(--text-secondary);
}
:root[data-theme="dark"] .calendar-info{
  background:linear-gradient(180deg, rgba(14,30,55,.88), rgba(10,22,42,.88));
}
.event-list{display:grid;gap:8px;}
.event-btn{
  appearance:none;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--surface-2);
  color:var(--text-primary);
  font:inherit;
  width:100%;
  min-height:52px;
  padding:0 10px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  text-align:left;
  cursor:pointer;
}
:root[data-theme="dark"] .event-btn{
  background:linear-gradient(180deg, rgba(16,33,62,.9), rgba(9,20,39,.9));
}
.event-time{
  min-width:56px;
  font-variant-numeric:tabular-nums;
  color:var(--text-secondary);
}
.event-label{
  flex:1;
  min-width:0;
}
.event-venue{
  font-weight:900;
}
.event-arrow{
  margin-left:auto;
  color:var(--text-muted);
  font-size:20px;
  line-height:1;
}
:root[data-theme="dark"] .event-arrow{ color:#7fb9ff; }
.event-empty{
  border:2px dashed var(--border);
  border-radius:10px;
  background:var(--surface-2);
  color:var(--text-secondary);
  padding:10px;
  font-size:14px;
}
.modal-bg{
  position:fixed;
  inset:0;
  z-index:1600;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:12px;
}
.modal-bg.show{display:flex;}
.modal{
  width:min(560px,100%);
  max-height:70dvh;
  overflow:auto;
  border:2px solid var(--border);
  border-radius:12px;
  background:var(--surface-1);
  padding:12px;
}
:root[data-theme="dark"] .modal{
  background:linear-gradient(180deg, rgba(19,38,70,.96), rgba(10,24,45,.96));
}
.modal h3{margin:0 0 8px;font-size:20px;}
.modal p{margin:0 0 10px;font-size:14px;color:var(--text-secondary);}
.modal-kv{
  display:grid;
  grid-template-columns:84px 1fr;
  gap:6px 10px;
  margin:0 0 10px;
}
.modal-k{
  margin:0;
  font-weight:900;
  color:var(--text-secondary);
}
.modal-v{
  margin:0;
  color:var(--text-primary);
  word-break:break-word;
}
.modal-flyer-wrap{
  margin:0 0 10px;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  background:var(--surface-2);
}
.modal-flyer{
  display:block;
  width:100%;
  max-height:320px;
  object-fit:contain;
  background:#fff;
}
.modal-link{
  color:var(--accent);
  font-weight:800;
}
.modal .btn{
  appearance:none;
  width:100%;
  min-height:42px;
  border:2px solid var(--accent);
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}
@media (max-width:460px){
  .header-title{font-size:30px;}
  .header-meta{font-size:12px;}
  .group-title{font-size:22px;}
  .swipe-label{font-size:22px;}

}
</style>

<body class="page-block-unified">

<header class="header">
  <div class="header-title">TSMS</div>
  <div class="header-meta">
    <span id="syncStatusInline" class="state-inline" data-state-tone="neutral" aria-live="polite">同期状態: --</span>
    <span>/</span>
    <span id="cacheVersionInline">cache: --</span>
  </div>
</header>

<main class="main" role="main">
  <section class="card dispatch-card" aria-label="出庫開始">
    <h2 class="group-title">出庫を開始</h2>
    <div class="swipe-track" id="dispatchSwipeTrack">
      <span class="swipe-label" id="dispatchSwipeLabel">右にスワイプして出庫</span>
      <button type="button" class="swipe-handle" id="dispatchSwipeHandle" aria-label="右にスワイプして出庫"><span class="swipe-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"></rect><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle><path d="M6 8l2-3h8l2 3"></path></svg></span></button>
    </div>
  </section>

  <section class="card section-boxed" aria-label="勤務カレンダー">
    <div class="calendar-head">
      <h2 class="group-title" style="margin:0;">カレンダー</h2>
      <div class="calendar-nav">
        <button type="button" class="calendar-nav-btn" id="calendarPrevBtn" aria-label="前月">‹</button>
        <p class="calendar-month" id="calendarMonthTitle">-</p>
        <button type="button" class="calendar-nav-btn" id="calendarNextBtn" aria-label="翌月">›</button>
      </div>
    </div>
    <div class="calendar-week" aria-hidden="true">
      <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <p class="calendar-info" id="calendarInfo">日付をタップすると勤務情報を表示します。</p>
  </section>

  <section class="card" aria-label="本日のイベント">
    <h2 class="group-title" id="dailyEventHeading">本日のイベント</h2>
    <p class="group-note" id="dailyEventNote">イベントリストは毎日自動更新されます。</p>
    <div class="event-list" id="dailyEventList"></div>
  </section>

  <section class="card" aria-label="アカウント">
    <h2 class="group-title">アカウント</h2>
    <a class="event-btn" id="accountLogoutLink" href="login.html?logout=1" aria-label="ログアウトしてログイン画面へ移動">
      <span class="event-time">→</span>
      <span>ログアウト</span>
      <span class="event-arrow">›</span>
    </a>
  </section>
</main>

<div class="modal-bg" id="eventModalBg" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
    <h3 id="eventModalTitle">イベント</h3>
    <div class="modal-kv">
      <p class="modal-k" id="eventModalDateLabel">開催日時</p>
      <p class="modal-v" id="eventModalDateValue">-</p>
      <p class="modal-k">会場住所</p>
      <p class="modal-v" id="eventModalAddressValue">-</p>
      <p class="modal-k" id="eventModalOpenLabel">開場</p>
      <p class="modal-v" id="eventModalOpenValue">-</p>
      <p class="modal-k" id="eventModalStartLabel">開演</p>
      <p class="modal-v" id="eventModalStartValue">-</p>
      <p class="modal-k" id="eventModalEndLabel">終演</p>
      <p class="modal-v" id="eventModalEndValue">-</p>
    </div>
    <div class="modal-flyer-wrap" id="eventModalFlyerWrap" hidden>
      <img id="eventModalFlyer" class="modal-flyer" alt="イベントフライヤー">
    </div>
    <p><a id="eventModalSourceLink" class="modal-link" href="#" target="_blank" rel="noopener" hidden>その他は元サイトを開く</a></p>
    <button type="button" class="btn" id="eventModalCloseBtn">閉じる</button>
  </div>
</div>

<script>
(function(){
  var KEY_OPS = "ops";
  var KEY_CURRENT_DAY = "tsms_report_current_day";
  var KEY_CONFIRM_FORCE_EMPTY = "tsms_confirm_force_empty";
  var KEY_OPS_SYNC_REV = "ops_sync_rev_v1";
  var KEY_SALES_PLAN = "tsms_sales_plan";
  var KEY_CLOUD_OK = "tsms_cloud_last_success_at";
  var KEY_CLOUD_NG = "tsms_cloud_last_failure_at";

  var syncInline = document.getElementById("syncStatusInline");
  var dispatchTrack = document.getElementById("dispatchSwipeTrack");
  var dispatchHandle = document.getElementById("dispatchSwipeHandle");
  var dispatchLabel = document.getElementById("dispatchSwipeLabel");
  var calendarMonthTitle = document.getElementById("calendarMonthTitle");
  var calendarPrevBtn = document.getElementById("calendarPrevBtn");
  var calendarNextBtn = document.getElementById("calendarNextBtn");
  var calendarGrid = document.getElementById("calendarGrid");
  var calendarInfo = document.getElementById("calendarInfo");
  var dailyEventHeading = document.getElementById("dailyEventHeading");
  var dailyEventList = document.getElementById("dailyEventList");
  var dailyEventNote = document.getElementById("dailyEventNote");
  var dailyEventTimer = null;
  var calendarCursor = (function(){
    var now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), 1);
  })();
  var eventModalBg = document.getElementById("eventModalBg");
  var eventModalTitle = document.getElementById("eventModalTitle");
  var eventModalDateLabel = document.getElementById("eventModalDateLabel");
  var eventModalDateValue = document.getElementById("eventModalDateValue");
  var eventModalAddressValue = document.getElementById("eventModalAddressValue");
  var eventModalOpenLabel = document.getElementById("eventModalOpenLabel");
  var eventModalOpenValue = document.getElementById("eventModalOpenValue");
  var eventModalStartLabel = document.getElementById("eventModalStartLabel");
  var eventModalStartValue = document.getElementById("eventModalStartValue");
  var eventModalEndLabel = document.getElementById("eventModalEndLabel");
  var eventModalEndValue = document.getElementById("eventModalEndValue");
  var eventModalFlyerWrap = document.getElementById("eventModalFlyerWrap");
  var eventModalFlyer = document.getElementById("eventModalFlyer");
  var eventModalSourceLink = document.getElementById("eventModalSourceLink");
  var eventModalCloseBtn = document.getElementById("eventModalCloseBtn");
  var dailyEventData = [];
  var dailyEventViewData = [];
  var SOURCE_VENUE_NAME_MAP = {
    "www-kitara-sapporo-or-jp-event": "札幌コンサートホール Kitara",
    "www-kyobun-org-event-schedule-html": "札幌市教育文化会館",
    "www-sapporo-community-plaza-jp-event-php": "札幌市民交流プラザ",
    "www-sapporo-shiminhall-org": "カナモトホール",
    "www-zepp-co-jp-hall-sapporo-schedule": "Zepp Sapporo"
  };

  function nowISO(){ return new Date().toISOString(); }
  function localYmd(){
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function weekdayJa(d){ return ["日","月","火","水","木","金","土"][d.getDay()]; }
  function todayEventHeadingText(){
    var d = new Date();
    return (d.getMonth() + 1) + "/" + d.getDate() + "(" + weekdayJa(d) + ")のイベント";
  }
  function fmtYmdJa(d){
    return d.getFullYear() + "/" + pad2(d.getMonth()+1) + "/" + pad2(d.getDate()) + "(" + weekdayJa(d) + ")";
  }
  function fmtYmdFromIso(ymd){
    if(!/^\d{4}-\d{2}-\d{2}$/.test(String(ymd || ""))) return String(ymd || "");
    var parts = String(ymd).split("-");
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    if(isNaN(d.getTime())) return String(ymd);
    return fmtYmdJa(d);
  }
  function fmtHm(iso){
    if(!iso) return "--:--";
    var d = new Date(iso);
    if(isNaN(d)) return "--:--";
    return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
  }
  function safeJsonParse(raw, fallback){
    try{
      var val = JSON.parse(raw);
      return (val == null ? fallback : val);
    }catch(_){
      return fallback;
    }
  }
  function defaultOpsData(){
    return {
      date: (new Date()).toISOString().slice(0,10),
      departAt: null,
      returnAt: null,
      breakActive: false,
      breakStartAt: null,
      breakSessions: [],
      shiftClosed: false,
      updatedAt: null,
      dayId: ""
    };
  }
  function normalizeOpsData(raw){
    var d = Object.assign(defaultOpsData(), raw || {});
    d.breakSessions = Array.isArray(d.breakSessions) ? d.breakSessions : [];
    if(typeof d.shiftClosed !== "boolean") d.shiftClosed = !!d.returnAt;
    if(d.shiftClosed && d.breakActive){
      d.breakActive = false;
      d.breakStartAt = null;
    }
    return d;
  }
  function loadOps(){
    return normalizeOpsData(safeJsonParse(localStorage.getItem(KEY_OPS), defaultOpsData()));
  }
  function saveOps(data){
    var stamp = nowISO();
    var d = normalizeOpsData(data);
    d.updatedAt = stamp;
    localStorage.setItem(KEY_OPS_SYNC_REV, stamp);
    localStorage.setItem(KEY_OPS, JSON.stringify(d));
  }

  function updateSyncStatus(){
    if(!syncInline) return;
    var okAt = localStorage.getItem(KEY_CLOUD_OK) || "";
    var ngAt = localStorage.getItem(KEY_CLOUD_NG) || "";
    var okMs = okAt ? new Date(okAt).getTime() : 0;
    var ngMs = ngAt ? new Date(ngAt).getTime() : 0;
    if(okMs && okMs >= ngMs){
      syncInline.dataset.stateTone = "success";
      syncInline.textContent = "同期待済み";
      return;
    }
    if(ngMs){
      syncInline.dataset.stateTone = "error";
      syncInline.textContent = "同期エラー";
      return;
    }
    syncInline.dataset.stateTone = "neutral";
    syncInline.textContent = "同期状態: --";
  }

  var dragging = false;
  var dragPointerId = null;
  var dragStartX = 0;
  var dragStartPos = 0;
  var currentPos = 0;

  function getMaxHandleX(){
    if(!dispatchTrack || !dispatchHandle) return 0;
    return Math.max(0, dispatchTrack.clientWidth - dispatchHandle.offsetWidth - 10);
  }
  function setDispatchGlow(progress, px){
    if(!dispatchTrack) return;
    var p = Math.max(0, Math.min(1, Number(progress) || 0));
    var glowX = 28 + Math.max(0, Number(px) || 0);
    var percent = Math.round(p * 1000) / 10;
    var tail = Math.min(100, percent + 14);
    var opacity = 0.18 + (p * 0.82);
    var scale = 0.985 + (p * 0.015);
    var insetBlur = 10 + (p * 18);
    var outerBlur = 8 + (p * 20);
    var handleGlow = 6 + (p * 10);
    dispatchTrack.style.setProperty("--swipe-progress", String(p));
    dispatchTrack.style.setProperty("--swipe-progress-pct", percent + "%");
    dispatchTrack.style.setProperty("--swipe-progress-tail", tail + "%");
    dispatchTrack.style.setProperty("--swipe-glow-x", glowX + "px");
    dispatchTrack.style.setProperty("--swipe-glow-opacity", opacity.toFixed(3));
    dispatchTrack.style.setProperty("--swipe-glow-scale", scale.toFixed(3));
    dispatchTrack.style.setProperty("--swipe-inset-blur", insetBlur.toFixed(1) + "px");
    dispatchTrack.style.setProperty("--swipe-outer-blur", outerBlur.toFixed(1) + "px");
    dispatchTrack.style.setProperty("--swipe-handle-glow", handleGlow.toFixed(1) + "px");
  }
  function setHandlePos(px, animate){
    if(!dispatchHandle) return;
    var max = getMaxHandleX();
    var x = Math.max(0, Math.min(max, Number(px)||0));
    var progress = max > 0 ? (x / max) : 0;
    currentPos = x;
    setDispatchGlow(progress, x + (dispatchHandle.offsetWidth / 2));
    dispatchHandle.style.transition = animate ? "transform .18s ease" : "none";
    dispatchHandle.style.transform = "translate3d(" + x + "px,-50%,0)";
  }
  function lockDispatchSlider(departAt){
    if(!dispatchTrack || !dispatchLabel) return;
    dispatchTrack.classList.add("locked");
    var t = fmtHm(departAt);
    dispatchLabel.textContent = "出庫済み " + (t === "--:--" ? "" : t);
    setHandlePos(getMaxHandleX(), true);
  }
  function unlockDispatchSlider(){
    if(!dispatchTrack || !dispatchLabel) return;
    dispatchTrack.classList.remove("locked");
    dispatchTrack.classList.remove("dragging");
    dispatchLabel.textContent = "右にスワイプして出庫";
    setHandlePos(0, true);
  }

  function renderDispatchState(){
    var d = loadOps();
    if(d.departAt){
      lockDispatchSlider(d.departAt);
      return;
    }
    unlockDispatchSlider();
  }

  function runDispatch(){
    var d = loadOps();
    if(d.departAt){
      renderDispatchState();
      return;
    }
    var dayId = localYmd();
    localStorage.removeItem(KEY_CONFIRM_FORCE_EMPTY);
    localStorage.setItem(KEY_CURRENT_DAY, dayId);
    d.dayId = dayId;
    d.departAt = nowISO();
    d.returnAt = null;
    d.shiftClosed = false;
    saveOps(d);
    renderDispatchState();
  }

  if(dispatchHandle && dispatchTrack){
    dispatchHandle.addEventListener("pointerdown", function(e){
      if(dispatchTrack.classList.contains("locked")) return;
      dragging = true;
      dragPointerId = e.pointerId;
      dragStartX = e.clientX;
      dragStartPos = currentPos;
      dispatchTrack.classList.add("dragging");
      try{ dispatchHandle.setPointerCapture(e.pointerId); }catch(_){ }
      e.preventDefault();
    });

    dispatchHandle.addEventListener("pointermove", function(e){
      if(!dragging || e.pointerId !== dragPointerId) return;
      var dx = e.clientX - dragStartX;
      setHandlePos(dragStartPos + dx, false);
      e.preventDefault();
    });

    function finishDrag(pointerId){
      if(!dragging || pointerId !== dragPointerId) return;
      dragging = false;
      dragPointerId = null;
      if(dispatchTrack) dispatchTrack.classList.remove("dragging");
      var max = getMaxHandleX();
      var passed = (max > 0) && (currentPos >= max * 0.82);
      if(passed){
        setHandlePos(max, true);
        runDispatch();
      }else{
        setHandlePos(0, true);
      }
    }

    dispatchHandle.addEventListener("pointerup", function(e){ finishDrag(e.pointerId); });
    dispatchHandle.addEventListener("pointercancel", function(e){ finishDrag(e.pointerId); });
    window.addEventListener("resize", function(){
      if(dispatchTrack && dispatchTrack.classList.contains("locked")) setHandlePos(getMaxHandleX(), false);
      else setHandlePos(0, false);
    });
  }

  function loadSalesPlan(){
    return safeJsonParse(localStorage.getItem(KEY_SALES_PLAN), {});
  }
  function shiftMeta(shift){
    if(shift === "work" || shift === "part" || shift === "furidashi") return {label:"出勤", dot:"work"};
    if(shift === "holiday" || shift === "furikyu") return {label:"休日", dot:"holiday"};
    if(shift === "absence") return {label:"欠勤", dot:"absence"};
    return {label:"未設定", dot:""};
  }
  function normalizeEventRecord(raw){
    if(!raw || typeof raw !== "object") return null;
    var title = String(raw.title || "").trim();
    var startDate = String(raw.start_date || "").trim();
    if(!title || !startDate) return null;
    return {
      title: title,
      start_date: startDate,
      end_date: String(raw.end_date || "").trim(),
      open_time: String(raw.open_time || "").trim(),
      start_time: String(raw.start_time || "").trim(),
      end_time: String(raw.end_time || "").trim(),
      venue: String(raw.venue || "").trim(),
      venue_address: String(raw.venue_address || "").trim(),
      quality_score: Number(raw.quality_score || 0),
      summary: String(raw.summary || "").trim(),
      flyer_image_url: String(raw.flyer_image_url || "").trim(),
      detail_url: String(raw.detail_url || "").trim(),
      source_name: String(raw.source_name || "").trim(),
      source_id: String(raw.source_id || "").trim()
    };
  }
  function isDisplayableEvent(ev){
    if(!ev) return false;
    var title = String(ev.title || "").trim();
    if(!title) return false;
    if(Number(ev.quality_score || 0) < 0.56) return false;
    if(/^(イベント|イベント情報|event|events|schedule)(\s*[|｜:].*)?$/i.test(title)) return false;
    if(/^明日\(\)開催$/.test(title)) return false;
    if(/宴会場|会議室|客室|宿泊|ご案内|施設案内|公演・チケット情報|イベント一覧/.test(title)) return false;
    return true;
  }
  function eventTimeLabel(ev){
    if(!ev) return "--:--";
    if(ev.start_time && ev.start_time !== "00:00") return ev.start_time;
    if(ev.open_time && ev.open_time !== "00:00") return ev.open_time;
    return "--:--";
  }
  function eventSortTime(ev){
    if(ev && ev.start_time && ev.start_time !== "00:00") return ev.start_time;
    if(ev && ev.open_time && ev.open_time !== "00:00") return ev.open_time;
    return "99:99";
  }
  function isGenericHallName(venue){
    var v = String(venue || "").trim();
    if(!v) return false;
    return /^(小ホール|大ホール|中ホール|メインホール|ホール|スタジオ\d*|会場A|会場B|会場C)$/.test(v);
  }
  function sourceVenueName(ev){
    if(!ev) return "";
    var sid = String(ev.source_id || "").trim();
    return SOURCE_VENUE_NAME_MAP[sid] || "";
  }
  function eventVenueLabel(ev){
    if(!ev) return "";
    var venue = String(ev.venue || "").trim();
    var sourceName = sourceVenueName(ev) || "";
    if(venue){
      if(isGenericHallName(venue) && sourceName) return sourceName + " " + venue;
      return venue;
    }
    if(sourceName) return sourceName;
    return "詳細ページ参照";
  }
  function setEventEmptyState(text){
    if(!dailyEventList) return;
    dailyEventViewData = [];
    dailyEventList.innerHTML = "";
    var empty = document.createElement("div");
    empty.className = "event-empty";
    empty.textContent = text || "本日のイベントはありません。";
    dailyEventList.appendChild(empty);
  }
  function renderDailyEvents(){
    if(!dailyEventList) return;
    if(dailyEventHeading) dailyEventHeading.textContent = todayEventHeadingText();
    var today = localYmd();
    function isOnToday(ev){
      if(!ev || !ev.start_date) return false;
      var start = String(ev.start_date || "");
      var end = String(ev.end_date || "");
      if(!/^\d{4}-\d{2}-\d{2}$/.test(start)) return false;
      if(end && /^\d{4}-\d{2}-\d{2}$/.test(end)) return start <= today && today <= end;
      return start === today;
    }
    var todayEvents = dailyEventData.filter(function(ev){
      return isOnToday(ev) && isDisplayableEvent(ev);
    }).sort(function(a, b){
      return eventSortTime(a).localeCompare(eventSortTime(b)) ||
             eventVenueLabel(a).localeCompare(eventVenueLabel(b), "ja") ||
             (a.title || "").localeCompare(b.title || "", "ja");
    });
    dailyEventViewData = todayEvents.slice();
    dailyEventList.innerHTML = "";
    if(!todayEvents.length){
      setEventEmptyState("本日のイベントはありません。");
      if(dailyEventNote) dailyEventNote.textContent = "イベントリストは毎日03:10に自動更新されます。";
      return;
    }
    todayEvents.forEach(function(ev, idx){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "event-btn";
      btn.setAttribute("data-daily-event-index", String(idx));
      btn.innerHTML = '' +
        '<span class="event-time"></span>' +
        '<span class="event-label"><span class="event-venue"></span></span>' +
        '<span class="event-arrow">›</span>';
      var timeEl = btn.querySelector(".event-time");
      var venueEl = btn.querySelector(".event-venue");
      if(timeEl) timeEl.textContent = eventTimeLabel(ev);
      if(venueEl) venueEl.textContent = eventVenueLabel(ev);
      dailyEventList.appendChild(btn);
    });
    if(dailyEventNote){
      dailyEventNote.textContent = "本日のイベント " + todayEvents.length + "件（毎日03:10 更新）";
    }
  }
  async function loadDailyEvents(){
    var url = "./data/events.json?t=" + encodeURIComponent(localYmd() + "-" + Date.now());
    var res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error("event_feed_http_" + res.status);
    var payload = await res.json();
    var events = Array.isArray(payload && payload.events) ? payload.events : [];
    dailyEventData = events.map(normalizeEventRecord).filter(Boolean);
    dailyEventData.sort(function(a, b){
      return (a.start_date || "").localeCompare(b.start_date || "") ||
             (a.start_time || "99:99").localeCompare(b.start_time || "99:99") ||
             (a.title || "").localeCompare(b.title || "", "ja");
    });
  }
  async function refreshDailyEvents(){
    try{
      await loadDailyEvents();
      renderDailyEvents();
    }catch(_){
      dailyEventData = [];
      setEventEmptyState("イベントの取得に失敗しました。時間をおいて再読み込みしてください。");
      if(dailyEventNote) dailyEventNote.textContent = "イベントリストの取得でエラーが発生しました。";
    }
  }
  function msUntilNextMidnight(){
    var now = new Date();
    var next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 3, 0);
    return Math.max(1000, next.getTime() - now.getTime());
  }
  function scheduleDailyEventRefresh(){
    if(dailyEventTimer) clearTimeout(dailyEventTimer);
    dailyEventTimer = setTimeout(function(){
      refreshDailyEvents();
      scheduleDailyEventRefresh();
    }, msUntilNextMidnight());
  }
function renderCalendar(){
  if(!calendarGrid || !calendarMonthTitle) return;
  var year = calendarCursor.getFullYear();
  var month = calendarCursor.getMonth();
  var first = new Date(year, month, 1);
  var startWeekday = first.getDay();
  var days = new Date(year, month + 1, 0).getDate();
  var todayYmd = localYmd();
  var plan = loadSalesPlan();

  calendarMonthTitle.textContent = year + "年" + (month + 1) + "月";
  calendarGrid.innerHTML = "";
  if(calendarInfo) calendarInfo.textContent = "日付をタップすると勤務情報を表示します。";

  for(var blank = 0; blank < startWeekday; blank += 1){
    var empty = document.createElement("div");
    empty.className = "calendar-day empty";
    empty.setAttribute("aria-hidden", "true");
    calendarGrid.appendChild(empty);
  }

  for(var day = 1; day <= days; day += 1){
    var dayId = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    var row = plan[dayId] || {};
    var meta = shiftMeta(row.shift || "");
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "calendar-day" + (dayId === todayYmd ? " today" : "");
    btn.dataset.dayId = dayId;
    btn.dataset.shiftLabel = meta.label;
    btn.innerHTML = '<span>' + day + '</span>' + (meta.dot ? '<span class="shift-dot ' + meta.dot + '"></span>' : '');
    btn.addEventListener("click", function(ev){
      var target = ev.currentTarget;
      if(!calendarInfo || !target) return;
      calendarInfo.textContent = target.dataset.dayId + " : " + (target.dataset.shiftLabel || "未設定");
    });
    calendarGrid.appendChild(btn);
  }
}

if(calendarPrevBtn){
  calendarPrevBtn.addEventListener("click", function(){
    calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() - 1, 1);
    renderCalendar();
  });
}
if(calendarNextBtn){
  calendarNextBtn.addEventListener("click", function(){
    calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + 1, 1);
    renderCalendar();
  });
}

  function closeEventModal(){
    if(!eventModalBg) return;
    eventModalBg.classList.remove("show");
    eventModalBg.setAttribute("aria-hidden", "true");
  }
  function setModalValue(el, text){
    if(!el) return;
    el.textContent = text && String(text).trim() ? String(text).trim() : "-";
  }
  function setModalRowVisible(labelEl, valueEl, visible){
    var show = !!visible;
    if(labelEl) labelEl.hidden = !show;
    if(valueEl) valueEl.hidden = !show;
  }
  function eventDateTimeLabel(ev){
    if(!ev) return "-";
    var start = fmtYmdFromIso(ev.start_date || "");
    var end = ev.end_date ? fmtYmdFromIso(ev.end_date) : "";
    if(end && end !== start) return start + " 〜 " + end;
    return start;
  }
  function openEventModalByIndex(idx){
    if(!eventModalBg || !eventModalTitle) return;
    var ev = dailyEventViewData[idx];
    if(!ev) return;
    eventModalTitle.textContent = ev.title || "イベント";
    if(eventModalDateLabel) eventModalDateLabel.textContent = "開催日時";
    setModalValue(eventModalDateValue, eventDateTimeLabel(ev));
    setModalValue(eventModalAddressValue, ev.venue_address || ev.venue || "");
    setModalRowVisible(eventModalOpenLabel, eventModalOpenValue, true);
    setModalRowVisible(eventModalStartLabel, eventModalStartValue, true);
    setModalRowVisible(eventModalEndLabel, eventModalEndValue, false);
    setModalValue(eventModalOpenValue, (ev.open_time && ev.open_time !== "00:00") ? ev.open_time : "");
    setModalValue(eventModalStartValue, (ev.start_time && ev.start_time !== "00:00") ? ev.start_time : "");
    setModalValue(eventModalEndValue, "");
    if(eventModalFlyerWrap && eventModalFlyer){
      if(ev.flyer_image_url){
        eventModalFlyer.src = ev.flyer_image_url;
        eventModalFlyerWrap.hidden = false;
      }else{
        eventModalFlyer.removeAttribute("src");
        eventModalFlyerWrap.hidden = true;
      }
    }
    if(eventModalSourceLink){
      if(ev.detail_url){
        eventModalSourceLink.href = ev.detail_url;
        eventModalSourceLink.hidden = false;
      }else{
        eventModalSourceLink.removeAttribute("href");
        eventModalSourceLink.hidden = true;
      }
    }
    eventModalBg.classList.add("show");
    eventModalBg.setAttribute("aria-hidden", "false");
    if(eventModalCloseBtn) eventModalCloseBtn.focus();
  }
  if(eventModalCloseBtn){
    eventModalCloseBtn.addEventListener("click", closeEventModal);
  }
  if(eventModalBg){
    eventModalBg.addEventListener("click", function(e){
      if(e.target === eventModalBg) closeEventModal();
    });
  }
  if(dailyEventList){
    dailyEventList.addEventListener("click", function(e){
      var btn = e.target && e.target.closest ? e.target.closest(".event-btn[data-daily-event-index]") : null;
      if(!btn) return;
      var idx = Number(btn.getAttribute("data-daily-event-index"));
      if(!Number.isFinite(idx) || idx < 0) return;
      openEventModalByIndex(idx);
    });
  }

  updateSyncStatus();
  window.addEventListener("tsms-cloud-sync-status", updateSyncStatus);
  window.addEventListener("storage", function(e){
    if(!e || (e.key !== KEY_CLOUD_OK && e.key !== KEY_CLOUD_NG)) return;
    updateSyncStatus();
  });
  renderDispatchState();
  refreshDailyEvents();
  scheduleDailyEventRefresh();
  renderCalendar();
})();
</script>

<script>
(function(){
  var page=(location.pathname.split('/').pop()||'index.html').replace('.html','');
  document.querySelectorAll('.tsms-bottom-nav [data-tab]').forEach(function(a){
    if(a.getAttribute('data-tab')===page) a.classList.add('active');
  });
  var iconMap={
    report:'<svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>',
    confirm:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="m8 12 3 3 5-6"/></svg>',
    detail:'<svg viewBox="0 0 24 24"><path d="M4 19h16"/><rect x="6" y="10" width="3" height="6"/><rect x="11" y="7" width="3" height="9"/><rect x="16" y="5" width="3" height="11"/></svg>',
    ops:'<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M6 8l2-3h8l2 3"/></svg>',
    more:'<svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="6" cy="17" r="1.5"/><path d="M10 7h10M10 12h10M10 17h10"/></svg>'
  };
  document.querySelectorAll('.tsms-bottom-nav [data-tab]').forEach(function(a){
    var k=a.getAttribute('data-tab');
    var ico=a.querySelector('.ico');
    if(ico && iconMap[k]) ico.innerHTML=iconMap[k];
  });
  var moreIco=document.querySelector('#tsmsMoreBtn .ico');
  if(moreIco) moreIco.innerHTML=iconMap.more;
  var btn=document.getElementById('tsmsMoreBtn');
  var bg=document.getElementById('tsmsMoreBg');
  var sheet=document.getElementById('tsmsMoreSheet');
  function closeMore(){ if(sheet) sheet.classList.remove('show'); if(bg) bg.classList.remove('show'); }
  if(btn&&bg&&sheet){
    btn.addEventListener('click',function(){sheet.classList.add('show');bg.classList.add('show');});
    bg.addEventListener('click',closeMore);
  }
  document.querySelectorAll('.tsms-bottom-nav a, .tsms-more-sheet a').forEach(function(a){
    a.addEventListener('click',closeMore);
  });
})();
</script>
