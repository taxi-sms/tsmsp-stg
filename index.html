<style>
:root{
  --bg:#F3F6F8;
  --surface-1:#FFFFFF;
  --surface-2:#EEF3F6;
  --border:#D5DEE6;
  --text-primary:#0F1720;
  --text-secondary:#344554;
  --text-muted:#5B6D7C;
  --accent:#2580ED;
  --work:#1c9b2d;
  --holiday:#f0ad00;
  --danger:#d64545;
}
:root[data-theme="dark"]{
  --bg:#0F1417;
  --surface-1:#0e1a2d;
  --surface-2:#0a1630;
  --border:#2f4d77;
  --text-primary:#ecf3ff;
  --text-secondary:#b6c8e6;
  --text-muted:#89a3c7;
  --accent:#4da3ff;
  --work:#1c9b2d;
  --holiday:#f0ad00;
  --danger:#d64545;
}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text-primary);
  font-family:"Noto Sans JP",sans-serif;
}
body{padding-bottom:78px;}
.header{
  position:sticky;
  top:0;
  z-index:20;
  min-height:60px;
  border-bottom:2px solid var(--border);
  background:var(--surface-1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:0 14px;
  font-weight:900;
}
:root[data-theme="dark"] .header{
  background:linear-gradient(180deg, rgba(22,42,76,.95), rgba(10,22,47,.95));
  box-shadow:0 10px 24px rgba(0,0,0,.3);
}
.header-title{
  font-size:36px;
  line-height:1;
  letter-spacing:.02em;
}
.header-meta{
  display:flex;
  gap:6px;
  align-items:center;
  font-size:13px;
  color:var(--text-secondary);
  font-weight:700;
  text-align:right;
}
.main{
  max-width:760px;
  margin:0 auto;
  padding:12px;
  display:grid;
  gap:8px;
}
.card{
  border:2px solid var(--border);
  background:var(--surface-1);
  border-radius:14px;
  padding:10px;
}
.dispatch-card{padding-bottom:8px;}
:root[data-theme="dark"] .card{
  background:linear-gradient(180deg, rgba(19,38,70,.95), rgba(8,20,42,.95));
  box-shadow:0 10px 26px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
}
.group-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 8px;
  font-size:26px;
  font-weight:900;
}
.group-title::after{
  content:"";
  flex:1 1 auto;
  border-top:2px solid var(--border);
  opacity:.95;
}
.group-note{
  margin:0 0 8px;
  font-size:13px;
  color:var(--text-muted);
  font-weight:700;
}
.swipe-track{
  position:relative;
  min-height:60px;
  border:2px solid var(--border);
  background:var(--surface-2);
  border-radius:999px;
  padding:4px;
  overflow:hidden;
  touch-action:pan-y;
}
:root[data-theme="dark"] .swipe-track{
  background:linear-gradient(90deg, rgba(20,40,74,.92), rgba(62,118,194,.55));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.swipe-track.locked{ border-color:var(--accent); }
.swipe-track.locked .swipe-label{
  left:12px;
  right:12px;
  text-align:center;
}
.swipe-label{
  position:absolute;
  left:72px;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:26px;
  font-weight:900;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
:root[data-theme="dark"] .swipe-label{ color:#e3efff; }
.swipe-handle{
  position:absolute;
  left:4px;
  top:50%;
  width:48px;
  height:48px;
  border:2px solid var(--accent);
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font:inherit;
  font-size:26px;
  font-weight:900;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  cursor:pointer;
  touch-action:none;
  transform:translate3d(0,-50%,0);
}
:root[data-theme="dark"] .swipe-handle{
  background:linear-gradient(180deg, #78c5ff, #3f9bff);
  border-color:#8ad0ff;
  box-shadow:0 4px 14px rgba(45,140,255,.45);
}
.swipe-track.dragging .swipe-handle{ transition:none !important; }
.swipe-handle .swipe-icon{
  width:24px;
  height:24px;
  display:block;
}
.swipe-handle .swipe-icon svg{
  width:24px;
  height:24px;
  stroke:#ffffff;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  display:block;
}
.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.calendar-month{
  margin:0;
  font-size:18px;
  font-weight:900;
  color:var(--text-secondary);
}
.calendar-nav{
  display:flex;
  align-items:center;
  gap:6px;
}
.calendar-nav-btn{
  appearance:none;
  width:32px;
  height:32px;
  border:2px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  color:var(--text-primary);
  font:inherit;
  font-size:20px;
  line-height:1;
  font-weight:900;
  display:grid;
  place-items:center;
  cursor:pointer;
}
:root[data-theme="dark"] .calendar-nav-btn{
  background:linear-gradient(180deg, rgba(16,33,62,.9), rgba(9,20,39,.9));
}
.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:5px;
}
.calendar-week span{
  text-align:center;
  font-size:13px;
  color:var(--text-muted);
  font-weight:800;
}
.calendar-day{
  border:2px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  min-height:44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  font:inherit;
  font-size:13px;
  font-weight:800;
  color:var(--text-primary);
  padding:2px;
}
:root[data-theme="dark"] .calendar-day{
  background:linear-gradient(180deg, rgba(15,31,58,.9), rgba(9,20,40,.9));
}
.calendar-day.empty{
  border-style:dashed;
  opacity:.35;
}
.calendar-day.today{
  border-color:var(--accent);
}
:root[data-theme="dark"] .calendar-day.today{
  box-shadow:0 0 0 2px rgba(88,194,255,.18), 0 0 14px rgba(65,148,255,.35);
}
.shift-dot{width:8px;height:8px;border-radius:50%;display:block;}
.shift-dot.work{background:var(--work);}
.shift-dot.holiday{background:var(--holiday);}
.shift-dot.absence{background:var(--danger);}
.calendar-info{
  margin:8px 0 0;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface-2);
  padding:8px;
  font-size:13px;
  color:var(--text-secondary);
}
:root[data-theme="dark"] .calendar-info{
  background:linear-gradient(180deg, rgba(14,30,55,.88), rgba(10,22,42,.88));
}
.event-list{display:grid;gap:8px;}
.event-btn{
  appearance:none;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--surface-2);
  color:var(--text-primary);
  font:inherit;
  width:100%;
  min-height:52px;
  padding:0 10px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  text-align:left;
  cursor:pointer;
}
:root[data-theme="dark"] .event-btn{
  background:linear-gradient(180deg, rgba(16,33,62,.9), rgba(9,20,39,.9));
}
.event-time{
  min-width:56px;
  font-variant-numeric:tabular-nums;
  color:var(--text-secondary);
}
.event-arrow{
  margin-left:auto;
  color:var(--text-muted);
  font-size:20px;
  line-height:1;
}
:root[data-theme="dark"] .event-arrow{ color:#7fb9ff; }
.modal-bg{
  position:fixed;
  inset:0;
  z-index:1600;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:12px;
}
.modal-bg.show{display:flex;}
.modal{
  width:min(420px,100%);
  border:2px solid var(--border);
  border-radius:12px;
  background:var(--surface-1);
  padding:12px;
}
:root[data-theme="dark"] .modal{
  background:linear-gradient(180deg, rgba(19,38,70,.96), rgba(10,24,45,.96));
}
.modal h3{margin:0 0 8px;font-size:20px;}
.modal p{margin:0 0 10px;font-size:14px;color:var(--text-secondary);}
.modal .btn{
  appearance:none;
  width:100%;
  min-height:42px;
  border:2px solid var(--accent);
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}
@media (max-width:460px){
  .header-title{font-size:30px;}
  .header-meta{font-size:12px;}
  .group-title{font-size:22px;}
  .swipe-label{font-size:22px;}

}
</style>

<body>

<header class="header">
  <div class="header-title">TSMS</div>
  <div class="header-meta">
    <span id="syncStatusInline">同期状態: --</span>
    <span>/</span>
    <span id="cacheVersionInline">cache: --</span>
  </div>
</header>

<main class="main" role="main">
  <section class="card dispatch-card" aria-label="出庫開始">
    <h2 class="group-title">出庫を開始</h2>
    <div class="swipe-track" id="dispatchSwipeTrack">
      <span class="swipe-label" id="dispatchSwipeLabel">右にスワイプして出庫</span>
      <button type="button" class="swipe-handle" id="dispatchSwipeHandle" aria-label="右にスワイプして出庫"><span class="swipe-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"></rect><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle><path d="M6 8l2-3h8l2 3"></path></svg></span></button>
    </div>
  </section>

  <section class="card" aria-label="勤務カレンダー">
    <div class="calendar-head">
      <h2 class="group-title" style="margin:0;">カレンダー</h2>
      <div class="calendar-nav">
        <button type="button" class="calendar-nav-btn" id="calendarPrevBtn" aria-label="前月">‹</button>
        <p class="calendar-month" id="calendarMonthTitle">-</p>
        <button type="button" class="calendar-nav-btn" id="calendarNextBtn" aria-label="翌月">›</button>
      </div>
    </div>
    <div class="calendar-week" aria-hidden="true">
      <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <p class="calendar-info" id="calendarInfo">日付をタップすると勤務情報を表示します。</p>
  </section>

  <section class="card" aria-label="本日・近日イベント">
    <h2 class="group-title">本日・近日イベント</h2>
    <p class="group-note" id="dailyEventNote">イベントリストは毎日自動更新されます。</p>
    <div class="event-list" id="dailyEventList">
      <button type="button" class="event-btn" data-daily-event-index="0" data-event-title="イベント #1" data-event-detail="TBA（イベント連携未実装）">
        <span class="event-time">TBA</span>
        <span class="event-label">当日イベント（準備中）</span>
        <span class="event-arrow">›</span>
      </button>
      <button type="button" class="event-btn" data-daily-event-index="1" data-event-title="イベント #2" data-event-detail="TBA（イベント連携未実装）">
        <span class="event-time">TBA</span>
        <span class="event-label">近日イベント（準備中）</span>
        <span class="event-arrow">›</span>
      </button>
      <button type="button" class="event-btn" data-daily-event-index="2" data-event-title="イベント #3" data-event-detail="TBA（イベント連携未実装）">
        <span class="event-time">TBA</span>
        <span class="event-label">近日イベント（準備中）</span>
        <span class="event-arrow">›</span>
      </button>
    </div>
  </section>

  <section class="card" aria-label="アカウント">
    <h2 class="group-title">アカウント</h2>
    <a class="event-btn" href="login.html" aria-label="ログアウトしてログイン画面へ移動">
      <span class="event-time">→</span>
      <span>ログアウト</span>
      <span class="event-arrow">›</span>
    </a>
  </section>
</main>

<div class="modal-bg" id="eventModalBg" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
    <h3 id="eventModalTitle">イベント</h3>
    <p id="eventModalDetail">TBA</p>
    <button type="button" class="btn" id="eventModalCloseBtn">閉じる</button>
  </div>
</div>

<script>
(function(){
  var KEY_OPS = "ops";
  var KEY_CURRENT_DAY = "tsms_report_current_day";
  var KEY_CONFIRM_FORCE_EMPTY = "tsms_confirm_force_empty";
  var KEY_OPS_SYNC_REV = "ops_sync_rev_v1";
  var KEY_SALES_PLAN = "tsms_sales_plan";
  var KEY_CLOUD_OK = "tsms_cloud_last_success_at";
  var KEY_CLOUD_NG = "tsms_cloud_last_failure_at";

  var syncInline = document.getElementById("syncStatusInline");
  var dispatchTrack = document.getElementById("dispatchSwipeTrack");
  var dispatchHandle = document.getElementById("dispatchSwipeHandle");
  var dispatchLabel = document.getElementById("dispatchSwipeLabel");
  var calendarMonthTitle = document.getElementById("calendarMonthTitle");
  var calendarPrevBtn = document.getElementById("calendarPrevBtn");
  var calendarNextBtn = document.getElementById("calendarNextBtn");
  var calendarGrid = document.getElementById("calendarGrid");
  var calendarInfo = document.getElementById("calendarInfo");
  var dailyEventList = document.getElementById("dailyEventList");
  var dailyEventNote = document.getElementById("dailyEventNote");
  var dailyEventTimer = null;
  var calendarCursor = (function(){
    var now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), 1);
  })();
  var eventModalBg = document.getElementById("eventModalBg");
  var eventModalTitle = document.getElementById("eventModalTitle");
  var eventModalDetail = document.getElementById("eventModalDetail");
  var eventModalCloseBtn = document.getElementById("eventModalCloseBtn");

  function nowISO(){ return new Date().toISOString(); }
  function localYmd(){
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function weekdayJa(d){ return ["日","月","火","水","木","金","土"][d.getDay()]; }
  function fmtYmdJa(d){
    return d.getFullYear() + "/" + pad2(d.getMonth()+1) + "/" + pad2(d.getDate()) + "(" + weekdayJa(d) + ")";
  }
  function fmtHm(iso){
    if(!iso) return "--:--";
    var d = new Date(iso);
    if(isNaN(d)) return "--:--";
    return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
  }
  function safeJsonParse(raw, fallback){
    try{
      var val = JSON.parse(raw);
      return (val == null ? fallback : val);
    }catch(_){
      return fallback;
    }
  }
  function defaultOpsData(){
    return {
      date: (new Date()).toISOString().slice(0,10),
      departAt: null,
      returnAt: null,
      breakActive: false,
      breakStartAt: null,
      breakSessions: [],
      shiftClosed: false,
      updatedAt: null,
      dayId: ""
    };
  }
  function normalizeOpsData(raw){
    var d = Object.assign(defaultOpsData(), raw || {});
    d.breakSessions = Array.isArray(d.breakSessions) ? d.breakSessions : [];
    if(typeof d.shiftClosed !== "boolean") d.shiftClosed = !!d.returnAt;
    if(d.shiftClosed && d.breakActive){
      d.breakActive = false;
      d.breakStartAt = null;
    }
    return d;
  }
  function loadOps(){
    return normalizeOpsData(safeJsonParse(localStorage.getItem(KEY_OPS), defaultOpsData()));
  }
  function saveOps(data){
    var stamp = nowISO();
    var d = normalizeOpsData(data);
    d.updatedAt = stamp;
    localStorage.setItem(KEY_OPS_SYNC_REV, stamp);
    localStorage.setItem(KEY_OPS, JSON.stringify(d));
  }

  function updateSyncStatus(){
    if(!syncInline) return;
    var okAt = localStorage.getItem(KEY_CLOUD_OK) || "";
    var ngAt = localStorage.getItem(KEY_CLOUD_NG) || "";
    var okMs = okAt ? new Date(okAt).getTime() : 0;
    var ngMs = ngAt ? new Date(ngAt).getTime() : 0;
    if(okMs && okMs >= ngMs){
      syncInline.textContent = "同期待済み";
      return;
    }
    if(ngMs){
      syncInline.textContent = "同期エラー";
      return;
    }
    syncInline.textContent = "同期状態: --";
  }

  var dragging = false;
  var dragPointerId = null;
  var dragStartX = 0;
  var dragStartPos = 0;
  var currentPos = 0;

  function getMaxHandleX(){
    if(!dispatchTrack || !dispatchHandle) return 0;
    return Math.max(0, dispatchTrack.clientWidth - dispatchHandle.offsetWidth - 10);
  }
  function setHandlePos(px, animate){
    if(!dispatchHandle) return;
    var x = Math.max(0, Math.min(getMaxHandleX(), Number(px)||0));
    currentPos = x;
    dispatchHandle.style.transition = animate ? "transform .18s ease" : "none";
    dispatchHandle.style.transform = "translate3d(" + x + "px,-50%,0)";
  }
  function lockDispatchSlider(departAt){
    if(!dispatchTrack || !dispatchLabel) return;
    dispatchTrack.classList.add("locked");
    var t = fmtHm(departAt);
    dispatchLabel.textContent = "出庫済み " + (t === "--:--" ? "" : t);
    setHandlePos(getMaxHandleX(), true);
  }
  function unlockDispatchSlider(){
    if(!dispatchTrack || !dispatchLabel) return;
    dispatchTrack.classList.remove("locked");
    dispatchTrack.classList.remove("dragging");
    dispatchLabel.textContent = "右にスワイプして出庫";
    setHandlePos(0, true);
  }

  function renderDispatchState(){
    var d = loadOps();
    if(d.departAt){
      lockDispatchSlider(d.departAt);
      return;
    }
    unlockDispatchSlider();
  }

  function runDispatch(){
    var d = loadOps();
    if(d.departAt){
      renderDispatchState();
      return;
    }
    var dayId = localYmd();
    localStorage.removeItem(KEY_CONFIRM_FORCE_EMPTY);
    localStorage.setItem(KEY_CURRENT_DAY, dayId);
    d.dayId = dayId;
    d.departAt = nowISO();
    d.returnAt = null;
    d.shiftClosed = false;
    saveOps(d);
    renderDispatchState();
  }

  if(dispatchHandle && dispatchTrack){
    dispatchHandle.addEventListener("pointerdown", function(e){
      if(dispatchTrack.classList.contains("locked")) return;
      dragging = true;
      dragPointerId = e.pointerId;
      dragStartX = e.clientX;
      dragStartPos = currentPos;
      dispatchTrack.classList.add("dragging");
      try{ dispatchHandle.setPointerCapture(e.pointerId); }catch(_){ }
      e.preventDefault();
    });

    dispatchHandle.addEventListener("pointermove", function(e){
      if(!dragging || e.pointerId !== dragPointerId) return;
      var dx = e.clientX - dragStartX;
      setHandlePos(dragStartPos + dx, false);
      e.preventDefault();
    });

    function finishDrag(pointerId){
      if(!dragging || pointerId !== dragPointerId) return;
      dragging = false;
      dragPointerId = null;
      if(dispatchTrack) dispatchTrack.classList.remove("dragging");
      var max = getMaxHandleX();
      var passed = (max > 0) && (currentPos >= max * 0.82);
      if(passed){
        setHandlePos(max, true);
        runDispatch();
      }else{
        setHandlePos(0, true);
      }
    }

    dispatchHandle.addEventListener("pointerup", function(e){ finishDrag(e.pointerId); });
    dispatchHandle.addEventListener("pointercancel", function(e){ finishDrag(e.pointerId); });
    window.addEventListener("resize", function(){
      if(dispatchTrack && dispatchTrack.classList.contains("locked")) setHandlePos(getMaxHandleX(), false);
      else setHandlePos(0, false);
    });
  }

  function loadSalesPlan(){
    return safeJsonParse(localStorage.getItem(KEY_SALES_PLAN), {});
  }
  function shiftMeta(shift){
    if(shift === "work" || shift === "part" || shift === "furidashi") return {label:"出勤", dot:"work"};
    if(shift === "holiday" || shift === "furikyu") return {label:"休日", dot:"holiday"};
    if(shift === "absence") return {label:"欠勤", dot:"absence"};
    return {label:"未設定", dot:""};
  }
  function renderDailyEvents(){
    if(!dailyEventList) return;
    var labels = ["当日イベント", "翌日イベント", "近日イベント"];
    var details = [
      "当日の予定です。",
      "翌日の予定です。",
      "近日の予定です。"
    ];
    var base = new Date();
    var buttons = dailyEventList.querySelectorAll(".event-btn[data-daily-event-index]");
    buttons.forEach(function(btn){
      var idx = Number(btn.getAttribute("data-daily-event-index"));
      if(!Number.isFinite(idx) || idx < 0) idx = 0;
      var eventDate = new Date(base.getFullYear(), base.getMonth(), base.getDate() + idx);
      var dateText = fmtYmdJa(eventDate);
      var timeEl = btn.querySelector(".event-time");
      var labelEl = btn.querySelector(".event-label");
      var label = labels[idx] || "イベント";
      var detail = details[idx] || "予定を確認してください。";
      if(timeEl) timeEl.textContent = dateText;
      if(labelEl) labelEl.textContent = label + "（自動更新）";
      btn.dataset.eventTitle = label + " " + dateText;
      btn.dataset.eventDetail = dateText + " " + detail;
    });
    if(dailyEventNote){
      dailyEventNote.textContent = "イベントリストは毎日0:00に自動更新されます。";
    }
  }
  function msUntilNextMidnight(){
    var now = new Date();
    var next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 3, 0);
    return Math.max(1000, next.getTime() - now.getTime());
  }
  function scheduleDailyEventRefresh(){
    if(dailyEventTimer) clearTimeout(dailyEventTimer);
    dailyEventTimer = setTimeout(function(){
      renderDailyEvents();
      scheduleDailyEventRefresh();
    }, msUntilNextMidnight());
  }
function renderCalendar(){
  if(!calendarGrid || !calendarMonthTitle) return;
  var year = calendarCursor.getFullYear();
  var month = calendarCursor.getMonth();
  var first = new Date(year, month, 1);
  var startWeekday = first.getDay();
  var days = new Date(year, month + 1, 0).getDate();
  var todayYmd = localYmd();
  var plan = loadSalesPlan();

  calendarMonthTitle.textContent = year + "年" + (month + 1) + "月";
  calendarGrid.innerHTML = "";
  if(calendarInfo) calendarInfo.textContent = "日付をタップすると勤務情報を表示します。";

  for(var blank = 0; blank < startWeekday; blank += 1){
    var empty = document.createElement("div");
    empty.className = "calendar-day empty";
    empty.setAttribute("aria-hidden", "true");
    calendarGrid.appendChild(empty);
  }

  for(var day = 1; day <= days; day += 1){
    var dayId = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    var row = plan[dayId] || {};
    var meta = shiftMeta(row.shift || "");
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "calendar-day" + (dayId === todayYmd ? " today" : "");
    btn.dataset.dayId = dayId;
    btn.dataset.shiftLabel = meta.label;
    btn.innerHTML = '<span>' + day + '</span>' + (meta.dot ? '<span class="shift-dot ' + meta.dot + '"></span>' : '');
    btn.addEventListener("click", function(ev){
      var target = ev.currentTarget;
      if(!calendarInfo || !target) return;
      calendarInfo.textContent = target.dataset.dayId + " : " + (target.dataset.shiftLabel || "未設定");
    });
    calendarGrid.appendChild(btn);
  }
}

if(calendarPrevBtn){
  calendarPrevBtn.addEventListener("click", function(){
    calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() - 1, 1);
    renderCalendar();
  });
}
if(calendarNextBtn){
  calendarNextBtn.addEventListener("click", function(){
    calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + 1, 1);
    renderCalendar();
  });
}

  function closeEventModal(){
    if(!eventModalBg) return;
    eventModalBg.classList.remove("show");
    eventModalBg.setAttribute("aria-hidden", "true");
  }
  if(eventModalCloseBtn){
    eventModalCloseBtn.addEventListener("click", closeEventModal);
  }
  if(eventModalBg){
    eventModalBg.addEventListener("click", function(e){
      if(e.target === eventModalBg) closeEventModal();
    });
  }
  document.querySelectorAll(".event-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      if(!eventModalBg || !eventModalTitle || !eventModalDetail) return;
      eventModalTitle.textContent = btn.dataset.eventTitle || "イベント";
      eventModalDetail.textContent = btn.dataset.eventDetail || "TBA";
      eventModalBg.classList.add("show");
      eventModalBg.setAttribute("aria-hidden", "false");
      if(eventModalCloseBtn) eventModalCloseBtn.focus();
    });
  });

  updateSyncStatus();
  renderDispatchState();
  renderDailyEvents();
  scheduleDailyEventRefresh();
  renderCalendar();
})();
</script>
