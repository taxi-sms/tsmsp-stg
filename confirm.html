<style>
  body{margin:0;font-family:"Noto Sans JP", sans-serif;background:#fff;color:#000}
  .wrap{width:100%;max-width:none;margin:0;padding:0}
  #cards{display:block}
  .wrap #cards .card{
    border:0!important;
    border-bottom:none!important;
    background:transparent!important;
    padding:8px 0 10px;
    margin:0;
  }
  .wrap #cards .card:first-child{border-top:none!important}
  .entry-head{
    display:flex;align-items:center;gap:8px;
    margin:0 0 6px 0;
  }
  .entry-head::after{
    content:"";
    flex:1 1 auto;
    border-top:1px solid var(--border);
    opacity:.9;
  }
  .entry-head .label{
    font-weight:900;
    font-size:13px;
    line-height:1.2;
    flex:0 0 auto;
  }
  .time-text{
    font-weight:900;
    font-size:15px;
    line-height:1.2;
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .kv{
    display:grid;
    grid-template-columns:84px 1fr;
    gap:8px;
    align-items:start;
    margin:0;
    padding:1px 0;
  }
  .kv .label{
    font-weight:800;
    font-size:13px;
    line-height:1.35;
  }
  .kv .value{
    font-weight:800;
    font-size:15px;
    line-height:1.35;
    word-break:break-word;
  }
  .kv.payment-row .value{color:#FD7E00;font-weight:900;}
  .kv.amount-row .value{font-variant-numeric:tabular-nums;}
  .note{
    margin-top:4px;
    font-size:13px;
    line-height:1.35;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tag{
    display:inline-block;
    border:1px solid var(--border);
    padding:2px 6px;
    font-size:12px;
    font-weight:900;
    line-height:1.2;
    background:transparent;
  }
  .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
  .actionBtn{border:2px solid #000;background:#fff;padding:6px 10px;font-weight:900;font-size:14px}
  .empty{padding:24px 0;color:#666;text-align:center}
  .wrap .date-switcher{
    border:0!important;
    background:transparent!important;
    padding:0!important;
    margin:0 0 8px 0;
  }
  .date-switcher label{display:none!important}
  .date-switcher select{width:100%;box-sizing:border-box;border:2px solid #000;background:#fff;padding:10px;font-size:16px}
  .wrap > .date-switcher, .wrap > #cards{margin:12px;}
  .tsms-header{
    position:sticky; top:0; z-index:100;
    height:60px; background:#fff;
    border-bottom:2px solid #000;
    display:flex; align-items:center;
    padding:0 14px 0 56px;
    font-weight:900; font-size:20px;
  }
  .header-to-report{
    margin-left:auto;
    border:2px solid #000;
    padding:6px 10px;
    font-size:14px;
    font-weight:900;
    color:#000;
    text-decoration:none;
    line-height:1.2;
    background:#fff;
  }
  .tsms-hamburger{
    position:absolute; left:14px; top:50%;
    transform:translateY(-50%);
    width:32px; height:24px;
    display:flex; flex-direction:column; justify-content:space-between;
    cursor:pointer; user-select:none;
  }
  .tsms-hamburger span{ height:3px; background:#000; display:block; }
  .tsms-menu{
    position:fixed; top:0; left:0; height:100%; width:280px;
    background:#fff; border-right:2px solid #000;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:1000; padding-top:60px;
  }
  .tsms-menu.open{ transform:translateX(0); }
  .tsms-menu a{
    display:block; padding:16px;
    border-bottom:1px solid #ddd;
    text-decoration:none; color:#000;
    font-size:18px; font-weight:900;
  }
  .tsms-menu small{ display:block; margin-top:2px; font-size:12px; font-weight:700; color:#666; }
  .tsms-menu-bg{
    position:fixed; inset:0;
    background:rgba(0,0,0,.25);
    opacity:0; pointer-events:none;
    transition:opacity .2s ease;
    z-index:900;
  }
  .tsms-menu-bg.show{ opacity:1; pointer-events:auto; }

</style>

<script>
(function(){
  const KEY = "tsms_reports";
  const ARCHIVE_KEY = "tsms_reports_archive";
  const CURRENT_DAY_KEY = "tsms_report_current_day";
  const CONFIRM_FORCE_EMPTY_KEY = "tsms_confirm_force_empty";
  let allData = [];
  let selectedDayId = "";

  function yen(v){
    const n = Number(v || 0);
    return n.toLocaleString("ja-JP") + "円";
  }
  function esc(s){
    return String(s||"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function saveActive(active){
    localStorage.setItem(KEY, JSON.stringify(active));
  }

  function load(){
    let active=[];
    let archived=[];
    try { active = JSON.parse(localStorage.getItem(KEY) || "[]"); }
    catch (_) { active = []; }
    try { archived = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); }
    catch (_) { archived = []; }
    if(!Array.isArray(active)) active = [];
    if(!Array.isArray(archived)) archived = [];
    allData = active.map((r)=>Object.assign({__source:"active"}, r)).concat(archived.map((r)=>Object.assign({__source:"archive"}, r)));
  }

  function fallbackDayIdFromTs(ts){
    if(!ts) return "";
    const d = new Date(ts);
    if(isNaN(d)) return "";
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function rowDayId(r){
    return (r && r.dayId) ? String(r.dayId) : fallbackDayIdFromTs(r && r.ts);
  }

  function dayLabel(dayId){
    return String(dayId || "").replace(/-/g, "/");
  }

  function rowDateTimeText(r){
    const day = rowDayId(r);
    const time = String((r && r.time) || "").trim();
    if(day && time) return `${dayLabel(day)} ${time}`;
    if(time) return time;
    if(r && r.ts){
      const d = new Date(r.ts);
      if(!isNaN(d)){
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2, "0");
        const dayNum = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${y}/${m}/${dayNum} ${hh}:${mm}`;
      }
    }
    return "--";
  }

  function availableDays(){
    const set = new Set();
    allData.forEach((r)=>{
      const dayId = rowDayId(r);
      if(dayId) set.add(dayId);
    });
    return Array.from(set).sort((a,b)=> b.localeCompare(a));
  }

function todayLocalYmd(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

  function syncDateSelect(){
    const sel = document.getElementById("confirmDateSelect");
    if(!sel) return;

    const days = availableDays();
    const today = todayLocalYmd();
    const currentDay = localStorage.getItem(CURRENT_DAY_KEY) || "";
    const forceEmpty = localStorage.getItem(CONFIRM_FORCE_EMPTY_KEY) === "1";

    sel.innerHTML = "";

    const emptyOpt = document.createElement("option");
    emptyOpt.value = "";
    emptyOpt.textContent = "日付を選択";
    sel.appendChild(emptyOpt);

    days.forEach((dayId)=>{
      const opt = document.createElement("option");
      opt.value = dayId;
      opt.textContent = dayLabel(dayId);
      sel.appendChild(opt);
    });

    let next = "";
    if(!forceEmpty && currentDay && days.includes(currentDay)){
      next = currentDay;
    }else if(selectedDayId && days.includes(selectedDayId)){
      next = selectedDayId;
    }else if(!forceEmpty && days.includes(today)){
      next = today;
    }else if(!forceEmpty && days.length > 0){
      next = days[0];
    }

    selectedDayId = next;
    sel.value = next;
    sel.disabled = false;
  }

  function filteredDataWithIndex(){
    const out = [];
    allData.forEach((r, idx)=>{
      if(rowDayId(r) === selectedDayId){
        out.push({ row: r, idx });
      }
    });
    return out;
  }

  function render(){
    const root = document.getElementById("cards");
    if(!root) return;

    const rows = filteredDataWithIndex();
    if(rows.length === 0){
      root.innerHTML = '<div class="empty">この日付のデータがありません</div>';
      return;
    }

    root.innerHTML = "";
    rows.forEach(({row:r, idx})=>{
      const card = document.createElement("div");
      card.className = "card";
      const lines = [];
      lines.push(`<div class="kv"><span class="label">乗車種別</span><span class="value">${esc(r.rideType||"")}</span></div>`);
      lines.push(`<div class="kv payment-row"><span class="label">支払い方法</span><span class="value">${esc(r.payMethod||"")}</span></div>`);
      if(r.ticketSub) lines.push(`<div class="kv"><span class="label">チケット区分</span><span class="value">${esc(r.ticketSub)}</span></div>`);
      if(Number(r.cash||0) > 0) lines.push(`<div class="kv amount-row"><span class="label">現収</span><span class="value">${esc(yen(r.cash))}</span></div>`);
      if(Number(r.credit||0) > 0) lines.push(`<div class="kv amount-row"><span class="label">未収</span><span class="value">${esc(yen(r.credit))}</span></div>`);
      if(r.note) lines.push(`<div class="note">${esc(r.note)}</div>`);
      if(r.disabilityDiscount) lines.push(`<div class="tag-row"><span class="tag">障害割引</span></div>`);

      card.innerHTML = `
        <div class="entry-head">
          <span class="time-text">${esc(rowDateTimeText(r))}</span>
        </div>
      ` + lines.join("\n") + `
        <div class="actions entry-actions">
          <button type="button" class="actionBtn" data-action="edit" data-idx="${idx}">修正</button>
          <button type="button" class="actionBtn" data-action="delete" data-idx="${idx}">削除</button>
        </div>`;
      root.appendChild(card);
    });
  }

  document.addEventListener("click", async (e)=>{
    const btn = e.target.closest("button.actionBtn");
    if(!btn) return;

    const action = btn.dataset.action;
    const idx = Number(btn.dataset.idx);
    if(Number.isNaN(idx) || !allData[idx]) return;

    if(action === "delete"){
      const row = allData[idx];
      if(row && row.__source === "archive"){
        alert("履歴データはここでは削除できません");
        return;
      }
      if(!(await window.tsmsConfirm("削除してよろしいですか？"))) return;
      allData.splice(idx, 1);
      const activeOnly = allData.filter((r)=> !r || r.__source !== "archive").map((r)=>{
        const c = Object.assign({}, r);
        delete c.__source;
        return c;
      });
      saveActive(activeOnly);
      syncDateSelect();
      render();
      if(window.tsmsCloud && typeof window.tsmsCloud.backupNow === "function"){
        window.tsmsCloud.backupNow();
      }
      return;
    }

    if(action === "edit"){
      const row = allData[idx];
      if(row && row.__source === "archive"){
        alert("履歴データは編集できません");
        return;
      }
      const id = row && row.id;
      if(!id){
        alert("編集対象のIDがありません");
        return;
      }
      location.href = `report.html?edit=${encodeURIComponent(id)}`;
    }
  });

  const sel = document.getElementById("confirmDateSelect");
if(sel){
  sel.addEventListener("change", ()=>{
    selectedDayId = sel.value || "";

    if(selectedDayId){
      localStorage.setItem(CURRENT_DAY_KEY, selectedDayId);
      localStorage.removeItem(CONFIRM_FORCE_EMPTY_KEY);
    }else{
      localStorage.removeItem(CURRENT_DAY_KEY);
    }

    render();
  });
}

  load();
  syncDateSelect();
  render();
})();
</script>

<script>
(function(){
  const menu = document.getElementById("tsmsMenu");
  const bg = document.getElementById("tsmsMenuBg");
  const burger = document.getElementById("tsmsHamburger");
  if(!menu || !bg || !burger) return;

  function openMenu(){ menu.classList.add("open"); bg.classList.add("show"); }
  function closeMenu(){ menu.classList.remove("open"); bg.classList.remove("show"); }

  burger.addEventListener("click", openMenu);
  burger.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" ") openMenu(); });
  bg.addEventListener("click", closeMenu);
  menu.querySelectorAll("a").forEach((a)=>a.addEventListener("click", closeMenu));
})();
</script>

<div class="tsms-more-sheet" id="tsmsMoreSheet" aria-label="その他メニュー">
  <a href="index.html">TOP</a>
  <a href="sales.html">月間管理</a>
  <a href="settings.html">設定</a>
</div>
<script>
(function(){
  var page=(location.pathname.split('/').pop()||'index.html').replace('.html','');
  document.querySelectorAll('.tsms-bottom-nav [data-tab]').forEach(function(a){
    if(a.getAttribute('data-tab')===page) a.classList.add('active');
  });
  var iconMap={
    report:'<svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>',
    confirm:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="m8 12 3 3 5-6"/></svg>',
    detail:'<svg viewBox="0 0 24 24"><path d="M4 19h16"/><rect x="6" y="10" width="3" height="6"/><rect x="11" y="7" width="3" height="9"/><rect x="16" y="5" width="3" height="11"/></svg>',
    ops:'<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M6 8l2-3h8l2 3"/></svg>',
    more:'<svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="6" cy="17" r="1.5"/><path d="M10 7h10M10 12h10M10 17h10"/></svg>'
  };
  document.querySelectorAll('.tsms-bottom-nav [data-tab]').forEach(function(a){
    var k=a.getAttribute('data-tab');
    var ico=a.querySelector('.ico');
    if(ico && iconMap[k]) ico.innerHTML=iconMap[k];
  });
  var moreIco=document.querySelector('#tsmsMoreBtn .ico');
  if(moreIco) moreIco.innerHTML=iconMap.more;
  var btn=document.getElementById('tsmsMoreBtn');
  var bg=document.getElementById('tsmsMoreBg');
  var sheet=document.getElementById('tsmsMoreSheet');
  function closeMore(){sheet.classList.remove('show');bg.classList.remove('show');}
  if(btn&&bg&&sheet){
    btn.addEventListener('click',function(){sheet.classList.add('show');bg.classList.add('show');});
    bg.addEventListener('click',closeMore);
  }
  var guard = page==='report';
  function isDirtyReport(){
    var cash=document.getElementById('in_cash');
    var credit=document.getElementById('in_credit');
    var note=document.getElementById('in_note');
    var hasVal=((cash&&cash.value)||(credit&&credit.value)||(note&&note.value));
    var selected=document.querySelector('button[data-group].is-selected');
    return !!(hasVal||selected);
  }
  document.querySelectorAll('.tsms-bottom-nav a, .tsms-more-sheet a').forEach(function(a){
    a.addEventListener('click',async function(e){
      if(guard && isDirtyReport() && !(await window.tsmsConfirm('入力を中止しますか？'))){
        e.preventDefault();
      }
      closeMore();
    });
  });
})();
</script>

  <script src="./cache-version.js"></script>
</body>
</html>
