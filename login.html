<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログイン</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#ffffff">
  <script>(function(){try{var t=localStorage.getItem("tsms_theme")==="dark"?"dark":"light";document.documentElement.setAttribute("data-theme",t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#0F1417":"#F3F6F8");}catch(e){}})();</script>
  <link rel="stylesheet" href="./tsms-design.css?v=20260227-3">
  <style id="login-layout-tweaks">
    main.auth-main{
      max-width:520px;
      min-height:calc(100dvh - var(--header-h));
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:var(--space-2);
    }
    .auth-card{
      border:var(--line-regular) solid var(--border)!important;
      background:var(--surface-1)!important;
      border-radius:var(--radius-md);
      padding:var(--space-3)!important;
      margin:0!important;
      box-shadow:var(--shadow-sm);
    }
    .auth-title{
      margin:0 0 var(--space-2);
      font-size:var(--font-3xl);
      line-height:1.35;
      font-weight:900;
      color:var(--text-primary);
      text-transform:none;
      letter-spacing:0;
    }
    .auth-card .field{
      border-bottom:0;
      padding:0;
      margin:0 0 var(--space-3);
    }
    .auth-card .label{font-size:var(--font-md)!important;}
    .auth-card .input{font-size:var(--font-2xl)!important;}
    .auth-card .btn{width:100%;}
    .auth-msg{
      margin-top:var(--space-3);
      border:var(--line-regular) solid var(--border);
      background:var(--surface-2);
      border-radius:var(--radius-sm);
      padding:var(--space-3);
      white-space:pre-wrap;
      font-size:var(--font-lg);
      line-height:1.45;
      min-height:44px;
    }
    .auth-links{
      display:flex;
      gap:var(--space-3);
      margin-top:var(--space-3);
      flex-wrap:wrap;
      align-items:center;
      font-size:var(--font-lg);
    }
    .brand{
      display:grid;
      justify-items:center;
      gap:6px;
      padding:18px 0 0;
    }
    .brand-main{
      font-weight:900;
      font-size:50px;
      letter-spacing:.04em;
      line-height:1;
    }
    .brand-sub{
      font-size:var(--font-lg);
      line-height:1.2;
      font-weight:800;
      letter-spacing:.18em;
      color:var(--text-muted);
    }
    #cacheVersionInline.brand-cache{
      display:block;
      text-align:center!important;
      margin:0 0 2px!important;
      font-size:var(--font-sm)!important;
      line-height:1.2;
      color:var(--text-muted);
      opacity:.8;
      min-height:0;
    }
  </style>
</head>
<body>
  <header class="header">ログイン</header>
  <main class="main auth-main">
    <div class="brand" aria-label="アプリタイトル">
      <div class="brand-main">タクろぐ</div>
      <div class="brand-sub">TAXI LOG</div>
    </div>
    <div id="cacheVersionInline" class="brand-cache" aria-label="cache-version"></div>

    <section class="auth-card">
      <h1 class="auth-title">メールアドレスでログイン</h1>

      <div class="field">
        <label class="label" for="email">メール</label>
        <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label class="label" for="password">パスワード</label>
        <input id="password" class="input" type="password" autocomplete="current-password" placeholder="********" />
      </div>

      <button id="btnLogin" class="btn next" type="button">ログイン</button>

      <div class="auth-msg" id="msg"></div>

      <div class="auth-links">
        <a href="./reset-password.html">PWを忘れた方はこちら</a>
        <a href="./signup.html">新規登録はこちら</a>
        <a href="./index.html">戻る</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./supabase-client.js";

    const $ = (id) => document.getElementById(id);
    const setMsg = (t) => { $("msg").textContent = t || ""; };
    const FORCE_HYDRATION_ONCE_KEY = "tsms_force_hydration_once";

    async function consumeLogoutQueryIfNeeded() {
      const url = new URL(location.href);
      if (url.searchParams.get("logout") !== "1") return;
      await supabase.auth.signOut();
      url.searchParams.delete("logout");
      try {
        history.replaceState({}, "", url.toString());
      } catch (_) {}
      setMsg("ログアウトしました。");
    }

    function consumeDeletedQueryIfNeeded() {
      const url = new URL(location.href);
      if (url.searchParams.get("deleted") !== "1") return;
      url.searchParams.delete("deleted");
      try {
        history.replaceState({}, "", url.toString());
      } catch (_) {}
      setMsg("アカウントを削除しました。");
    }

    $("btnLogin").addEventListener("click", async () => {
      setMsg("");
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return setMsg("メールとパスワードを入力してね。");

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return setMsg("エラー: " + error.message);

      const next = new URL(location.href).searchParams.get("next") || "./index.html";
      setMsg("ログイン成功。遷移します…");
      try { sessionStorage.setItem(FORCE_HYDRATION_ONCE_KEY, "1"); } catch (_) {}
      location.href = next;
    });

    await consumeLogoutQueryIfNeeded();
    consumeDeletedQueryIfNeeded();
  </script>
  <script src="./cache-version.js"></script>
</body>
</html>
