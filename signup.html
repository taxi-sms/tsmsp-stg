<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>新規登録</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#ffffff">
  <script>(function(){try{var t=localStorage.getItem("tsms_theme")==="dark"?"dark":"light";document.documentElement.setAttribute("data-theme",t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#0F1417":"#F3F6F8");}catch(e){}})();</script>
  <link rel="stylesheet" href="./tsms-design.css?v=20260227-3">
  <style id="signup-layout-tweaks">
    main.auth-main{
      max-width:520px;
      min-height:calc(100dvh - var(--header-h));
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:var(--space-2);
    }
    .auth-card{
      border:var(--line-regular) solid var(--border)!important;
      background:var(--surface-1)!important;
      border-radius:var(--radius-md);
      padding:var(--space-3)!important;
      margin:0!important;
      box-shadow:var(--shadow-sm);
    }
    .auth-title{
      margin:0 0 var(--space-2);
      font-size:var(--font-3xl);
      line-height:1.35;
      font-weight:900;
      color:var(--text-primary);
      text-transform:none;
      letter-spacing:0;
    }
    .auth-muted{
      font-size:var(--font-md);
      color:var(--text-muted);
      line-height:1.45;
      margin:0 0 var(--space-3);
    }
    .auth-card .field{
      border-bottom:0;
      padding:0;
      margin:0 0 var(--space-3);
    }
    .auth-card .label{font-size:var(--font-md)!important;}
    .auth-card .input{font-size:var(--font-2xl)!important;}
    .auth-card .btn{width:100%;}
    .auth-msg{
      margin-top:var(--space-3);
      border:var(--line-regular) solid var(--border);
      background:var(--surface-2);
      border-radius:var(--radius-sm);
      padding:var(--space-3);
      white-space:pre-wrap;
      font-size:var(--font-lg);
      line-height:1.45;
      min-height:44px;
    }
    .auth-links{
      display:flex;
      gap:var(--space-3);
      margin-top:var(--space-3);
      flex-wrap:wrap;
      font-size:var(--font-lg);
    }
    .auth-consent{
      display:flex;
      gap:8px;
      align-items:flex-start;
      margin:0 0 var(--space-3);
      font-size:var(--font-md);
      color:var(--text-secondary);
      line-height:1.45;
    }
    .auth-consent input{
      margin-top:3px;
      width:18px;
      height:18px;
      flex:0 0 auto;
    }
  </style>
</head>
<body>
  <header class="header">新規登録</header>
  <main class="main auth-main">
    <section class="auth-card">
      <h1 class="auth-title">メールアドレスで登録</h1>
      <p class="auth-muted">「認証メールを送信」ボタンを押すとメールを送信します。メール内リンクで認証を完了してからログインしてください。</p>

      <div class="field">
        <label class="label" for="email">メール</label>
        <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label class="label" for="password">パスワード（8文字以上推奨）</label>
        <input id="password" class="input" type="password" autocomplete="new-password" placeholder="********" />
      </div>

      <label class="auth-consent" for="consentLegal">
        <input id="consentLegal" type="checkbox" />
        <span><a href="./terms.html" target="_blank" rel="noopener">利用規約</a>・<a href="./privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>・<a href="./commerce.html" target="_blank" rel="noopener">特定商取引法に基づく表記</a>に同意する</span>
      </label>

      <button id="btn" class="btn next" type="button">認証メールを送信</button>
      <div class="auth-msg" id="msg"></div>

      <div class="auth-links">
        <a href="./login.html">ログインはこちら</a>
        <a href="./index.html">戻る</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./supabase-client.js";

    const $ = (id) => document.getElementById(id);
    const setMsg = (t) => { $("msg").textContent = t || ""; };
    const btn = $("btn");
    const initialBtnLabel = btn.textContent || "認証メールを送信";
    let clickArmed = false;
    let sending = false;

    btn.addEventListener("pointerdown", () => { clickArmed = true; });
    btn.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" || ev.key === " " || ev.key === "Spacebar") clickArmed = true;
    });

    btn.addEventListener("click", async () => {
      if (btn.disabled || sending) return;
      if (!clickArmed) {
        setMsg("「認証メールを送信」ボタンを押したときだけ送信されます。");
        return;
      }
      clickArmed = false;
      sending = true;
      setMsg("");
      const email = $("email").value.trim();
      const password = $("password").value;
      const consentEl = $("consentLegal");
      const consentLegal = !!(consentEl && consentEl.checked);

      if (!email || !password) {
        sending = false;
        return setMsg("メールとパスワードを入力してください。");
      }
      if (!consentLegal) {
        sending = false;
        return setMsg("利用規約・プライバシーポリシー・特商法表記への同意が必要です。");
      }

      btn.disabled = true;
      btn.textContent = "送信中...";

      const LEGAL_VERSION = "2026-03-07";
      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: new URL("auth-callback.html", location.href).toString(),
          data: {
            legal_version: LEGAL_VERSION,
            legal_agreed_at: new Date().toISOString()
          }
        }
      });

      if (error) {
        btn.disabled = false;
        btn.textContent = initialBtnLabel;
        sending = false;
        return setMsg("エラー: " + error.message);
      }

      btn.textContent = "認証メール送信済み";
      sending = false;
      const guideUrl = new URL("./signup-check-email.html", location.href);
      guideUrl.searchParams.set("email", email);
      location.href = guideUrl.toString();
    });
  </script>
  <script src="./cache-version.js"></script>
</body>
</html>
